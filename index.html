<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNAF IRL Multiplayer Security Cameras</title>
    
    <!-- PeerJS for P2P networking -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            overscroll-behavior-y: contain; 
            user-select: none;
        }

        /* Top Status Console */
        .lobby-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 60;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .share-btn {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .share-btn:hover { background: #00ff00; color: black; }
        #slot-status { color: #ffcc00; font-weight: bold; }

        .monitor-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            overflow: hidden; 
            transition: opacity 0.3s;
        }

        /* Video Feed */
        #main-monitor {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transform: scale(1.3) translateX(0%); 
            transform-origin: center center;
            will-change: transform;
        }

        /* Light Overlay */
        .light-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,240,0.4) 20%, rgba(0,0,0,0.85) 80%);
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.1s ease;
            transform: scale(1.3) translateX(0%); 
            transform-origin: center center;
            will-change: transform;
        }

        .monitor-container.light-on .light-overlay { opacity: 1; }

        /* Offline Screen */
        .offline-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #070707; color: #ff0000;
            font-size: 2rem;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            font-weight: bold; letter-spacing: 5px;
            text-align: center;
            line-height: 1.5;
        }

        /* Pitch Black Generator Outage Class */
        .pitch-black-outage {
            background: #000000 !important;
            position: fixed !important; 
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 200 !important; 
            color: #ff0000;
        }

        /* Scanlines */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none; z-index: 5;
        }

        /* TV Snow Static Effect - Modified to be a thick opaque barrier */
        #camera-static {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            background-color: #151515; /* Solid background completely covers video feed */
            transition: opacity 0.05s; /* Snappy transition */
        }

        .cam-label {
            position: absolute;
            top: 80px; left: 40px;
            font-size: 2rem; font-weight: bold; color: white;
            text-shadow: 2px 2px 0 #000; z-index: 20; letter-spacing: 2px;
        }

        .recording-dot {
            position: absolute;
            top: 85px; right: 40px;
            width: 25px; height: 25px;
            background-color: red;
            border-radius: 50%;
            z-index: 20; display: none;
            box-shadow: 0 0 15px red; animation: blink 1.5s infinite;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* FNAF HUD Elements */
        .guard-hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 30; display: none;
        }

        .time-display {
            position: absolute;
            top: 60px; right: 40px;
            font-size: 3rem; font-weight: bold;
            text-shadow: 2px 2px 0 #000; letter-spacing: 2px;
        }
        
        .night-display {
            position: absolute;
            top: 110px; right: 45px;
            font-size: 1.2rem; font-weight: bold;
            text-shadow: 2px 2px 0 #000; letter-spacing: 1px;
        }

        .power-display {
            position: absolute;
            bottom: 40px; left: 40px;
            font-size: 1.5rem; font-weight: bold;
            text-shadow: 2px 2px 0 #000; line-height: 1.5;
        }

        /* Controls */
        #flashlight-btn {
            position: absolute;
            bottom: 40px; left: 250px;
            padding: 15px 30px;
            font-size: 1.2rem; font-family: inherit; font-weight: bold;
            background: rgba(30, 30, 30, 0.85); color: white;
            border: 2px solid white; cursor: pointer; pointer-events: auto;
            touch-action: none; box-shadow: 0 0 10px rgba(255,255,255,0.2);
            display: none; 
        }
        #flashlight-btn:active { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,240,0.8); }

        #toggle-monitor-btn {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 60px; font-size: 1.2rem; font-family: inherit; font-weight: bold;
            background: rgba(255, 255, 255, 0.2); color: white; border: 2px solid white;
            cursor: pointer; pointer-events: auto; transition: background 0.2s;
            display: none;
        }
        #toggle-monitor-btn:hover { background: rgba(255,255,255,0.4); }

        .camera-map {
            position: absolute;
            bottom: 120px; right: 30px;
            width: 280px;
            border: 2px solid white; background: rgba(0, 0, 0, 0.8);
            padding: 15px; display: none; pointer-events: auto;
            grid-template-columns: 1fr 1fr; gap: 15px; 
        }

        .cam-btn {
            background: rgba(10, 10, 10, 0.6); color: #555;
            border: 1px solid #333; padding: 15px 0; cursor: pointer;
            font-family: inherit; font-size: 0.95rem; font-weight: bold; transition: all 0.1s;
        }
        .cam-btn.online { color: #00ff00; border-color: #00ff00; }
        .cam-btn.active {
            background: #fff !important; color: black !important;
            border-color: #fff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Animatronic / Saboteur Controls */
        #cam-controls {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 80; display: none; text-align: center; pointer-events: auto;
        }
        #sabotage-btn {
            padding: 18px 36px; font-size: 1.1rem; font-family: inherit; font-weight: bold;
            background: #990000; color: white; border: 2px solid red; cursor: pointer;
            border-radius: 5px; box-shadow: 0 0 20px rgba(255,0,0,0.6);
            transition: all 0.2s;
        }
        #sabotage-btn:disabled { background: #222; border-color: #555; color: #555; box-shadow: none; cursor: default; }

        /* Game Over Overlays */
        #death-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #000000; z-index: 250;
            display: none; pointer-events: none;
        }

        #win-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #00; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 250;
            font-size: 5rem; letter-spacing: 5px; font-weight: bold; text-shadow: 0 0 20px #fff;
            display: none; opacity: 0; transition: opacity 3s;
        }

        /* Real-life Generator Repair Overlay */
        #generator-repair-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #080808;
            z-index: 150;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        #wire-board {
            position: relative;
            width: 320px; height: 400px;
            background: #1b1b1b; border: 4px solid #ff3333;
            border-radius: 8px; box-shadow: 0 0 35px rgba(255,0,0,0.4);
            touch-action: none;
            margin-top: 20px;
        }
        #wire-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .system-log {
            position: absolute; top: 60px; left: 30px;
            width: 300px; height: 90px;
            background: rgba(0, 0, 0, 0.6); border: 1px solid #222;
            color: #00ff00; font-size: 0.65rem; padding: 10px; overflow: hidden;
            pointer-events: none; z-index: 40; line-height: 1.3; text-shadow: 0 0 2px #00ff00;
        }

        #screen-flash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffffff; z-index: 99999; display: none; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="screen-flash"></div>

    <div class="lobby-bar">
        <div>ROOM: <span id="room-id-display">...</span> | STATUS: <span id="slot-status">CONNECTING...</span></div>
        <button class="share-btn" onclick="copyRoomLink()">📋 COPY ROOM LINK</button>
    </div>

    <!-- Monitor Arena -->
    <div class="monitor-container" id="monitor-container">
        <video id="main-monitor" autoplay playsinline muted></video>
        <div class="light-overlay" id="light-overlay"></div>
        <div class="offline-screen" id="offline-screen">SYSTEM OFFLINE</div>
        <div class="scanlines"></div>
        <div id="camera-static"></div>
        
        <div class="cam-label" id="cam-label">LOBBY</div>
        <div class="recording-dot" id="recording-dot"></div>
    </div>

    <!-- Saboteur Controls -->
    <div id="cam-controls">
        <button id="sabotage-btn" onclick="triggerSabotage()">⚡ SABOTAGE GENERATOR (1/1)</button>
    </div>

    <!-- Guard HUD Elements -->
    <div class="guard-hud" id="guard-hud">
        <div class="time-display" id="time-display">12 AM</div>
        <div class="night-display">Night 1</div>
        
        <div class="power-display">
            Power left: <span id="power-pct">100</span>%<br>
            Usage: <span id="usage-bars">🟩</span>
        </div>

        <button id="flashlight-btn" 
                onmousedown="triggerFlashlight(true)" onmouseup="triggerFlashlight(false)"
                onmouseleave="triggerFlashlight(false)"
                ontouchstart="triggerFlashlight(true); event.preventDefault();" 
                ontouchend="triggerFlashlight(false); event.preventDefault();">
            🔦 LIGHT
        </button>

        <button id="toggle-monitor-btn" onclick="toggleMonitor()">MONITOR</button>

        <div class="camera-map" id="camera-map">
            <button class="cam-btn active" data-cam="cam1" onclick="switchCamera(event, 'cam1', 'CAM 01 (GEN ROOM)')">CAM 01</button>
            <button class="cam-btn" data-cam="cam2" onclick="switchCamera(event, 'cam2', 'CAM 02')">CAM 02</button>
            <button class="cam-btn" data-cam="cam3" onclick="switchCamera(event, 'cam3', 'CAM 03')">CAM 03</button>
            <button class="cam-btn" data-cam="cam4" onclick="switchCamera(event, 'cam4', 'CAM 04')">CAM 04</button>
        </div>
    </div>

    <!-- Generator Physical Repair Screen -->
    <div id="generator-repair-overlay">
        <div style="font-size: 1.3rem; color: #ff3333; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px red; text-align: center; padding: 0 10px;">
            ⚠️ GENERATOR OFFLINE ⚠️<br>
            <span style="font-size: 0.8rem; color: #777;">SOLVE WIRES TO RESTORE SYSTEM POWER</span>
        </div>
        <div id="wire-board">
            <canvas id="wire-canvas"></canvas>
        </div>
    </div>

    <!-- Game Over Overlays -->
    <div id="death-screen"></div>
    <div id="win-screen">5 AM...<br><span style="font-size:6rem; margin-top:20px;">6 AM</span><br><span style="font-size:1.5rem; margin-top:20px;">NIGHT SURVIVED</span></div>

    <!-- Debug Console -->
    <div class="system-log" id="system-log">> TERMINAL INITIALIZED...</div>

    <script>
        const mainMonitor = document.getElementById('main-monitor');
        const camLabel = document.getElementById('cam-label');
        const offlineScreen = document.getElementById('offline-screen');
        const buttons = document.querySelectorAll('.cam-btn');
        const cameraStatic = document.getElementById('camera-static');

        let myRole = null; 
        let localCameraStream = null;
        let currentCamId = 'cam1'; 
        let peer = null;
        let currentSlot = 1;
        let wakeLock = null;

        const connectedStreams = { 'cam1': null, 'cam2': null, 'cam3': null, 'cam4': null };
        const dataConnections = { 'cam1': null, 'cam2': null, 'cam3': null, 'cam4': null };

        let guardDataConnection = null; 
        let guardMediaCall = null;

        // Game state variables
        let gameActive = false;
        let isMonitorUp = true;
        let isLightOn = false;
        let isPowerOut = false;
        let currentHour = 0; 
        let gameTick = 0;
        let powerLevel = 100.0;

        let roomHash = window.location.hash.substring(1);
        if (!roomHash) {
            roomHash = "fnaf-" + Math.floor(1000 + Math.random() * 9000);
            window.location.hash = roomHash;
        }
        document.getElementById('room-id-display').innerText = roomHash.toUpperCase();

        function logSystem(msg) {
            const logEl = document.getElementById('system-log');
            if (logEl) {
                const lines = logEl.innerHTML.split('<br>');
                logEl.innerHTML = `> ${msg}<br>` + lines.slice(0, 3).join('<br>');
            }
        }

        function copyRoomLink() {
            navigator.clipboard.writeText(window.location.href);
            document.querySelector('.share-btn').innerText = "COPIED!";
            setTimeout(() => { document.querySelector('.share-btn').innerText = "📋 COPY ROOM LINK"; }, 2000);
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {}
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') await requestWakeLock();
        });

        // ==========================================
        // UI HELPERS (PITCH BLACK MODE)
        // ==========================================
        function setPitchBlackOutage(enable) {
            if (enable) {
                offlineScreen.classList.add('pitch-black-outage');
                offlineScreen.innerText = "FIX THE GENERATOR";
                offlineScreen.style.display = "flex";
                mainMonitor.style.display = "none";
            } else {
                offlineScreen.classList.remove('pitch-black-outage');
            }
        }

        // ==========================================
        // RETRO AUDIO & STATIC ENGINE
        // ==========================================
        function playStaticSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = audioCtx.sampleRate * 0.3; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1; 
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                noise.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start();
            } catch(e) {}
        }

        let motionStaticTimeout = null;
        function triggerVisualStatic(duration = 250) {
            if (cameraStatic) {
                cameraStatic.style.opacity = "1.0"; /* Make static completely thick (opaque) */
                clearTimeout(motionStaticTimeout);
                motionStaticTimeout = setTimeout(() => { 
                    cameraStatic.style.opacity = "0"; 
                }, duration);
            }
        }

        function playPowerOutSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 3.0); 
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 3.0);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 3.0);
            } catch (e) {}
        }

        function playGeneratorStartSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(30, now);
                osc.frequency.linearRampToValueAtTime(120, now + 1.8);
                gain.gain.setValueAtTime(0.01, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 1.0);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 2.0);
            } catch(e){}
        }

        function playClickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e){}
        }

        function playWinSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const chimeNotes = [
                    { f: 415.30, d: 0.6, t: 0.0 }, 
                    { f: 329.63, d: 0.6, t: 0.6 }, 
                    { f: 369.99, d: 0.6, t: 1.2 }, 
                    { f: 246.94, d: 1.2, t: 1.8 }  
                ];
                chimeNotes.forEach(note => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle'; 
                    osc.frequency.setValueAtTime(note.f, now + note.t);
                    gain.gain.setValueAtTime(0, now + note.t);
                    gain.gain.linearRampToValueAtTime(0.25, now + note.t + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + note.t + note.d);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + note.t);
                    osc.stop(now + note.t + note.d);
                });
            } catch (e) {}
        }

        // ==========================================
        // GUARD MODE & GAME LOOP
        // ==========================================
        function tryBecomeGuard() {
            peer = new Peer(`${roomHash}-guard`);

            peer.on('open', (id) => {
                myRole = 'guard';
                document.getElementById('slot-status').innerText = "SECURITY GUARD";
                logSystem("ASSIGNED ROLE: SECURITY GUARD");
                
                document.getElementById('guard-hud').style.display = 'block';
                document.getElementById('camera-map').style.display = 'grid';
                document.getElementById('flashlight-btn').style.display = 'block';
                document.getElementById('toggle-monitor-btn').style.display = 'block';
                camLabel.innerText = "CAM 01 (GEN ROOM)";

                requestWakeLock(); 
                setupGuardListeners();
                updateMonitorFeed();
                
                gameActive = true;
                setInterval(guardNightLoop, 1000);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    initCameraMode();
                }
            });
        }

        function guardNightLoop() {
            if (!gameActive || isPowerOut || myRole !== 'guard') return;

            gameTick++;

            if (gameTick % 60 === 0) {
                currentHour++;
                document.getElementById('time-display').innerText = currentHour === 0 ? "12 AM" : currentHour + " AM";
                
                if (currentHour >= 6) {
                    triggerWin();
                    return;
                }
            }

            let usage = 1; 
            if (isMonitorUp) usage++; 
            if (isLightOn) usage++;

            let bars = "";
            for(let i=0; i<usage; i++) bars += "🟩";
            document.getElementById('usage-bars').innerText = bars;

            powerLevel -= (usage * 0.16); 

            if (powerLevel <= 0) {
                powerLevel = 0;
                triggerGameOverDeath();
            }
            document.getElementById('power-pct').innerText = Math.floor(powerLevel);
        }

        function toggleMonitor() {
            if (isPowerOut) return;
            isMonitorUp = !isMonitorUp;
            
            const monitorCont = document.getElementById('monitor-container');
            const camMap = document.getElementById('camera-map');
            
            if (isMonitorUp) {
                monitorCont.style.opacity = '1';
                camMap.style.display = 'grid';
                playStaticSound();     
                triggerVisualStatic(300); 
            } else {
                monitorCont.style.opacity = '0';
                camMap.style.display = 'none';
                triggerFlashlight(false); 
            }
        }

        function triggerGameOverDeath() {
            gameActive = false;
            isPowerOut = true;
            triggerFlashlight(false);
            playPowerOutSound();

            for (let slot in dataConnections) {
                const conn = dataConnections[slot];
                if (conn && conn.open) {
                    try { conn.send({ type: 'gameover_death' }); } catch(e){}
                }
            }

            document.getElementById('death-screen').style.display = 'block';
            document.getElementById('guard-hud').style.display = 'none';
            document.getElementById('monitor-container').style.display = 'none';
        }

        function triggerSabotageOutage() {
            isPowerOut = true;
            triggerFlashlight(false);
            playPowerOutSound();

            setPitchBlackOutage(true);
            document.getElementById('guard-hud').style.display = 'none';

            logSystem("CRITICAL: GENERATOR DOWN. GET UP AND GO FIX CAM 1!");

            for (let slot in dataConnections) {
                const conn = dataConnections[slot];
                if (conn && conn.open) {
                    try { conn.send({ type: 'sabotage_outage' }); } catch(e){}
                }
            }
            updateCameraMapUI();
        }

        function restorePower() {
            isPowerOut = false;
            powerLevel = 100.0; 
            playGeneratorStartSound();

            document.getElementById('guard-hud').style.display = 'block';
            setPitchBlackOutage(false);
            
            logSystem("GENERATOR BACK ONLINE");
            updateMonitorFeed();
            updateCameraMapUI();

            for (let slot in dataConnections) {
                const conn = dataConnections[slot];
                if (conn && conn.open) {
                    try { conn.send({ type: 'powerrestored' }); } catch(e){}
                }
            }
        }

        function triggerWin() {
            gameActive = false;
            triggerFlashlight(false);
            playWinSound();

            for (let slot in dataConnections) {
                const conn = dataConnections[slot];
                if (conn && conn.open) {
                    try { conn.send({ type: 'win' }); } catch(e){}
                }
            }

            const winScreen = document.getElementById('win-screen');
            winScreen.style.display = 'flex';
            setTimeout(() => { winScreen.style.opacity = '1'; }, 100);
            
            document.getElementById('guard-hud').style.display = 'none';
            document.getElementById('monitor-container').style.display = 'none';
        }

        function setupGuardListeners() {
            peer.on('call', (call) => {
                const targetSlot = getSlotFromPeerId(call.peer);
                if (!targetSlot) return;

                call.answer(); 
                call.on('stream', (remoteStream) => {
                    connectedStreams[targetSlot] = remoteStream;
                    updateCameraMapUI();
                    updateMonitorFeed();
                });
            });

            peer.on('connection', (conn) => {
                const targetSlot = getSlotFromPeerId(conn.peer);
                if (!targetSlot) return;

                conn.on('open', () => {
                    dataConnections[targetSlot] = conn;
                    updateCameraMapUI();
                    if (isPowerOut) {
                        try { conn.send({ type: 'sabotage_outage' }); } catch(e){}
                    }
                });
                
                conn.on('data', (data) => {
                    if (data.type === 'sabotage') {
                        triggerSabotageOutage();
                    }
                    if (data.type === 'powerrestored') {
                        restorePower();
                    }
                    if (data.type === 'motion' && isMonitorUp && !isPowerOut) {
                        if (targetSlot === currentCamId) {
                            /* Blinds the guard with thick static for 600ms on motion. 
                               Because motion is sent every 300ms, continuous movement keeps the static 100% active. */
                            triggerVisualStatic(600); 
                        }
                    }
                });
            });
        }

        // ==========================================
        // CAMERA DEVICE MODE & MOTION DETECTION
        // ==========================================
        let motionCanvas = document.createElement('canvas');
        let motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
        let lastImageData = null;
        let lastMotionSentTime = 0;

        async function initCameraMode() {
            myRole = 'cam';
            document.getElementById('slot-status').innerText = "CONNECTING...";
            logSystem("DETERMINING CAMERA SLOT...");
            tryRegisterCamSlot(1);
        }

        function checkMotionLoop() {
            if (myRole !== 'cam' || !localCameraStream) return;
            
            if (mainMonitor.videoWidth === 0) {
                setTimeout(checkMotionLoop, 100);
                return;
            }

            motionCanvas.width = 64; 
            motionCanvas.height = 48;
            motionCtx.drawImage(mainMonitor, 0, 0, motionCanvas.width, motionCanvas.height);
            
            let currentImageData = motionCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
            let isMoving = false;
            
            if (lastImageData) {
                let diffCount = 0;
                for (let i = 0; i < currentImageData.data.length; i += 4) {
                    let rDiff = Math.abs(currentImageData.data[i] - lastImageData.data[i]);
                    let gDiff = Math.abs(currentImageData.data[i+1] - lastImageData.data[i+1]);
                    let bDiff = Math.abs(currentImageData.data[i+2] - lastImageData.data[i+2]);
                    if (rDiff + gDiff + bDiff > 100) { 
                        diffCount++;
                    }
                }
                if (diffCount > 150) { 
                    isMoving = true;
                }
            }
            lastImageData = currentImageData;
            
            if (isMoving) {
                const now = Date.now();
                if (now - lastMotionSentTime > 300) {
                    if (guardDataConnection && guardDataConnection.open) {
                        guardDataConnection.send({ type: 'motion' });
                    }
                    lastMotionSentTime = now;
                }
            }
            
            setTimeout(checkMotionLoop, 150); 
        }

        // Delay media streaming until slot is established so we can route front/back lens
        function tryRegisterCamSlot(slotNum) {
            if (slotNum > 4) {
                document.getElementById('slot-status').innerText = "ROOM FULL";
                return;
            }

            currentSlot = slotNum;
            if (peer) { try { peer.destroy(); } catch(e){} }

            peer = new Peer(`${roomHash}-cam-${slotNum}`);

            peer.on('open', async (id) => {
                const statusEl = document.getElementById('slot-status');
                statusEl.innerText = "INITIALIZING CAMERA...";
                
                const success = await acquireCameraStream(slotNum);
                if (!success) {
                    statusEl.innerText = "CAMERA ERROR";
                    return;
                }

                if (slotNum === 1) {
                    document.getElementById('slot-status').innerText = `GEN ROOM (CAM 1)`;
                    document.getElementById('cam-controls').style.display = "block";
                    camLabel.innerText = `CAM 01 (GEN ROOM) - ONLINE`;
                } else {
                    document.getElementById('slot-status').innerText = `BROADCASTING`;
                    camLabel.innerText = `CAM 0${slotNum} - ONLINE`;
                }
                
                document.getElementById('system-log').style.display = 'none';
                document.getElementById('recording-dot').style.display = 'block';
                
                mainMonitor.srcObject = localCameraStream;
                mainMonitor.style.display = "block";
                offlineScreen.style.display = "none";

                requestWakeLock(); 
                checkMotionLoop(); 

                peer.on('error', (err) => {
                    if (err.type === 'peer-unavailable') setTimeout(camConnectToGuard, 4000);
                });

                camConnectToGuard();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    setTimeout(() => { tryRegisterCamSlot(slotNum + 1); }, 600);
                }
            });
        }

        // Tailored hardware selection depending on Camera Slot assignment
        async function acquireCameraStream(slotNum) {
            const statusEl = document.getElementById('slot-status');
            
            try {
                if (slotNum === 1) {
                    // Generator camera specifically boots the selfie/front camera!
                    logSystem("GENERATOR CAM DETECTED. FORCING FRONT-FACING CAMERA...");
                    localCameraStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false
                    });
                    logSystem("FRONT SELFIE LENS LOCKED. READY FOR GENERATOR WIRES.");
                    return true;
                } else {
                    // Cams 2, 3, and 4 use the Back Camera + sweep for physical LED support!
                    logSystem(`CAM ${slotNum} DETECTED. SWEEPING LENSES FOR LED CONTROL...`);
                    
                    const tempStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' }, audio: false
                    });
                    
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevices = devices.filter(d => d.kind === 'videoinput');
                    
                    tempStream.getTracks().forEach(t => t.stop());
                    
                    let foundTorchStream = null;
                    let lensIndex = 1;
                    
                    for (let device of videoDevices) {
                        statusEl.innerText = `PROBING LENS ${lensIndex}/${videoDevices.length}...`;
                        logSystem(`TESTING LENS: ${device.label || 'Lens ' + lensIndex}`);
                        
                        try {
                            const testStream = await navigator.mediaDevices.getUserMedia({
                                video: { deviceId: { exact: device.deviceId } },
                                audio: false
                            });
                            
                            const track = testStream.getVideoTracks()[0];
                            const caps = typeof track.getCapabilities === 'function' ? track.getCapabilities() : null;
                            
                            if (caps && caps.torch) {
                                foundTorchStream = testStream;
                                logSystem(`SUCCESS: PHYSICAL LED SUPPORT FOUND ON ${device.label || 'LENS ' + lensIndex}`);
                                break;
                            } else {
                                testStream.getTracks().forEach(t => t.stop());
                            }
                        } catch (err) {
                            logSystem(`LENS ${lensIndex} INACCESSIBLE`);
                        }
                        lensIndex++;
                    }
                    
                    if (foundTorchStream) {
                        localCameraStream = foundTorchStream;
                    } else {
                        logSystem("NO HARDWARE LED SUPPORT DETECTED. USING SCREEN FLASH FALLBACK.");
                        localCameraStream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                            audio: false
                        });
                    }
                    return true;
                }
            } catch (err) {
                logSystem("CRITICAL: HARDWARE ACCESS BLOCK");
                return false;
            }
        }

        function camConnectToGuard() {
            const guardId = `${roomHash}-guard`;
            if (guardDataConnection) { try { guardDataConnection.close(); } catch(e){} }
            if (guardMediaCall) { try { guardMediaCall.close(); } catch(e){} }

            const conn = peer.connect(guardId);
            conn.on('open', () => {
                guardDataConnection = conn;
            });

            conn.on('data', (data) => {
                if (data.type === 'flashlight') {
                    toggleDeviceFlashlight(localCameraStream, data.state);
                }
                if (data.type === 'sabotage_outage') {
                    playPowerOutSound();
                    if (currentSlot === 1) {
                        openPhysicalGeneratorRepair();
                    } else {
                        document.getElementById('monitor-container').style.opacity = '1'; 
                        setPitchBlackOutage(true);
                        camLabel.innerText = "SYSTEM SHUTDOWN - GENERATOR FAILURE";
                    }
                }
                if (data.type === 'gameover_death') {
                    playPowerOutSound();
                    document.getElementById('death-screen').style.display = 'block';
                    document.getElementById('monitor-container').style.display = 'none';
                    document.getElementById('cam-controls').style.display = 'none';
                    document.getElementById('generator-repair-overlay').style.display = 'none';
                }
                if (data.type === 'powerrestored') {
                    playGeneratorStartSound();
                    document.getElementById('monitor-container').style.opacity = '1';
                    
                    if (currentSlot !== 1) {
                        setPitchBlackOutage(false);
                        mainMonitor.style.display = "block";
                    }
                    camLabel.innerText = currentSlot === 1 ? `CAM 01 (GEN ROOM) - ONLINE` : `CAM 0${currentSlot} - ONLINE`;
                }
                if (data.type === 'win') {
                    playWinSound();
                    document.getElementById('monitor-container').style.opacity = '1';
                    camLabel.innerText = "6 AM - CONGRATULATIONS!";
                }
            });

            conn.on('close', () => { setTimeout(camConnectToGuard, 4000); });
            guardMediaCall = peer.call(guardId, localCameraStream);
        }

        function triggerSabotage() {
            const btn = document.getElementById('sabotage-btn');
            btn.disabled = true;
            btn.innerText = "⚡ GENERATOR COMPROMISED";
            
            if (guardDataConnection && guardDataConnection.open) {
                guardDataConnection.send({ type: 'sabotage' });
            }
            playPowerOutSound();
            openPhysicalGeneratorRepair();
        }

        function openPhysicalGeneratorRepair() {
            document.getElementById('generator-repair-overlay').style.display = 'flex';
            
            const canvas = document.getElementById('wire-canvas');
            canvas.width = 320;
            canvas.height = 400;

            connections = [];
            draggingFrom = null;
            rightColors = shuffle([...leftColors]);
            
            drawWirePuzzle();
        }

        function completePhysicalGeneratorRepair() {
            document.getElementById('generator-repair-overlay').style.display = 'none';
            playGeneratorStartSound();

            const btn = document.getElementById('sabotage-btn');
            if (btn) {
                btn.disabled = false;
                btn.innerText = "⚡ SABOTAGE GENERATOR (1/1)";
            }

            if (guardDataConnection && guardDataConnection.open) {
                guardDataConnection.send({ type: 'powerrestored' });
            }
        }

        // ==========================================
        // WIRE REPAIR PUZZLE CODE
        // ==========================================
        let rightColors = [];
        let connections = [];
        let draggingFrom = null;
        let curX = 0, curY = 0;
        
        const leftX = 40;
        const leftY = [80, 160, 240, 320];
        const rightX = 280;
        const rightY = [80, 160, 240, 320];
        const leftColors = ['#ff3333', '#3333ff', '#ffff33', '#33ff33']; 

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function drawWirePuzzle() {
            const canvas = document.getElementById('wire-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 320, 400);

            if (draggingFrom !== null) {
                ctx.beginPath();
                ctx.moveTo(leftX, leftY[draggingFrom]);
                ctx.lineTo(curX, curY);
                ctx.strokeStyle = leftColors[draggingFrom];
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            connections.forEach(conn => {
                ctx.beginPath();
                ctx.moveTo(leftX, leftY[conn.leftIdx]);
                ctx.bezierCurveTo(leftX + 80, leftY[conn.leftIdx], rightX - 80, rightY[conn.rightIdx], rightX, rightY[conn.rightIdx]);
                ctx.strokeStyle = leftColors[conn.leftIdx];
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.stroke();
            });

            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(leftX, leftY[i], 15, 0, Math.PI * 2);
                ctx.fillStyle = leftColors[i];
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(leftX, leftY[i], 5, 0, Math.PI * 2);
                ctx.fillStyle = '#111';
                ctx.fill();
            }

            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(rightX, rightY[i], 15, 0, Math.PI * 2);
                ctx.fillStyle = rightColors[i];
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(rightX, rightY[i], 5, 0, Math.PI * 2);
                ctx.fillStyle = '#111';
                ctx.fill();
            }
        }

        function getPuzzleCoords(e) {
            const board = document.getElementById('wire-board');
            const rect = board.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = (clientX - rect.left) * (320 / rect.width);
            const y = (clientY - rect.top) * (400 / rect.height);
            return { x, y };
        }

        // Mouse & Touch Interaction
        function onPuzzleStart(e) {
            const coords = getPuzzleCoords(e);
            
            for (let i = 0; i < 4; i++) {
                const dy = coords.y - leftY[i];
                const dx = coords.x - leftX;
                if (Math.sqrt(dx*dx + dy*dy) < 30) {
                    if (connections.some(c => c.leftIdx === i)) continue;
                    draggingFrom = i;
                    curX = coords.x;
                    curY = coords.y;
                    e.preventDefault();
                    break;
                }
            }
        }

        function onPuzzleMove(e) {
            if (draggingFrom === null) return;
            const coords = getPuzzleCoords(e);
            curX = coords.x;
            curY = coords.y;
            drawWirePuzzle();
            e.preventDefault();
        }

        function onPuzzleEnd(e) {
            if (draggingFrom === null) return;
            
            for (let i = 0; i < 4; i++) {
                const dy = curY - rightY[i];
                const dx = curX - rightX;
                if (Math.sqrt(dx*dx + dy*dy) < 30) {
                    if (leftColors[draggingFrom] === rightColors[i]) {
                        if (!connections.some(c => c.rightIdx === i)) {
                            connections.push({ leftIdx: draggingFrom, rightIdx: i });
                            playClickSound();
                        }
                    }
                    break;
                }
            }
            draggingFrom = null;
            drawWirePuzzle();

            if (connections.length === 4) {
                setTimeout(completePhysicalGeneratorRepair, 400);
            }
        }

        const boardEl = document.getElementById('wire-board');
        boardEl.addEventListener('mousedown', onPuzzleStart);
        boardEl.addEventListener('mousemove', onPuzzleMove);
        window.addEventListener('mouseup', onPuzzleEnd);

        boardEl.addEventListener('touchstart', onPuzzleStart, { passive: false });
        boardEl.addEventListener('touchmove', onPuzzleMove, { passive: false });
        window.addEventListener('touchend', onPuzzleEnd);

        // ==========================================
        // MOTORIZED PANNING SYSTEM
        // ==========================================
        let currentPan = 0; let targetPan = 0; let touchStartX = 0; let basePan = 0;

        window.addEventListener('mousemove', (e) => {
            targetPan = (0.5 - (e.clientX / window.innerWidth)) * 24; 
        });

        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX; basePan = targetPan;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const deltaPercent = ((e.touches[0].clientX - touchStartX) / window.innerWidth) * 24;
            targetPan = Math.max(-12, Math.min(12, basePan + deltaPercent));
        }, { passive: true });

        function panAnimateLoop() {
            currentPan += (targetPan - currentPan) * 0.04; 
            if (mainMonitor) mainMonitor.style.transform = `scale(1.3) translateX(${currentPan}%)`;
            const lightOverlay = document.getElementById('light-overlay');
            if (lightOverlay) lightOverlay.style.transform = `scale(1.3) translateX(${currentPan * 1.08}%)`;
            requestAnimationFrame(panAnimateLoop);
        }
        panAnimateLoop();

        // ==========================================
        // UTILITIES & RENDERING
        // ==========================================
        function getSlotFromPeerId(peerId) {
            const index = peerId.lastIndexOf('-cam-');
            if (index === -1) return null;
            return 'cam' + peerId.substring(index + 5); 
        }

        function updateMonitorFeed() {
            if (myRole !== 'guard') return; 

            if (isPowerOut) {
                setPitchBlackOutage(true);
                document.getElementById('guard-hud').style.display = 'none';
                return;
            } else {
                setPitchBlackOutage(false);
            }

            if (connectedStreams[currentCamId]) {
                mainMonitor.srcObject = connectedStreams[currentCamId];
                mainMonitor.style.display = "block";
                offlineScreen.style.display = "none";
            } else {
                mainMonitor.srcObject = null;
                mainMonitor.style.display = "none";
                offlineScreen.style.display = "flex";
                offlineScreen.innerText = "SYSTEM OFFLINE";
            }
        }

        function updateCameraMapUI() {
            for (let i = 1; i <= 4; i++) {
                const slotKey = 'cam' + i;
                const btn = document.querySelector(`.cam-btn[data-cam="${slotKey}"]`);
                if (!btn) continue;
                
                if (isPowerOut) {
                    btn.classList.remove('online');
                    btn.style.color = "#444"; btn.style.borderColor = "#222"; btn.innerText = `CAM 0${i} (OFF)`;
                    btn.disabled = true;
                    btn.style.opacity = "0.3";
                    continue;
                }

                btn.disabled = false;
                btn.style.opacity = "1";
                if (connectedStreams[slotKey] || dataConnections[slotKey]) {
                    btn.classList.add('online');
                    btn.innerText = i === 1 ? "CAM 01 (GEN ROOM)" : `CAM 0${i}`;
                } else {
                    btn.classList.remove('online');
                    btn.innerText = `CAM 0${i} (OFF)`;
                }
            }
        }

        function switchCamera(event, camId, labelText) {
            if (myRole !== 'guard' || isPowerOut) return;

            playStaticSound();
            triggerVisualStatic(250);

            triggerFlashlight(false); 
            currentCamId = camId;
            camLabel.innerText = labelText;
            updateMonitorFeed();

            buttons.forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.cam-btn[data-cam="${camId}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        async function toggleDeviceFlashlight(stream, turnOn) {
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            if (!track) return;

            try {
                const caps = typeof track.getCapabilities === 'function' ? track.getCapabilities() : null;
                if (caps && caps.torch) await track.applyConstraints({ advanced: [{ torch: turnOn }] });
                else triggerScreenFlash(turnOn);
            } catch (err) { triggerScreenFlash(turnOn); }
        }

        function triggerScreenFlash(turnOn) {
            const flashEl = document.getElementById('screen-flash');
            if (flashEl) flashEl.style.display = turnOn ? 'block' : 'none';
        }

        function triggerFlashlight(isPressed) {
            if (myRole !== 'guard' || isPowerOut) return;
            if (!isMonitorUp) isPressed = false; 

            isLightOn = isPressed;

            const monitorContainer = document.querySelector('.monitor-container');
            if (isPressed) monitorContainer.classList.add('light-on');
            else monitorContainer.classList.remove('light-on');
            
            const conn = dataConnections[currentCamId];
            if (conn) {
                try { conn.send({ type: 'flashlight', state: isPressed }); } catch (e) {}
            }
        }

        window.addEventListener('beforeunload', () => { if (peer) peer.destroy(); });
        window.onload = tryBecomeGuard;
    </script>
</body>
</html>
