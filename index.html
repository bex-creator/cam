<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNAF Multiplayer Security Cameras</title>
    
    <!-- PeerJS for P2P networking -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            overscroll-behavior-y: contain; 
            user-select: none;
        }

        /* Top Retro Status Console */
        .lobby-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 30;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .share-btn {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .share-btn:hover { background: #00ff00; color: black; }
        #slot-status { color: #ffcc00; font-weight: bold; }

        .monitor-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            overflow: hidden; 
        }

        /* The Live Feed styling (Scaled up slightly to allow room to pan) */
        #main-monitor {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(60%) contrast(140%) brightness(70%);
            z-index: 1;
            transform: scale(1.3) translateX(0%); 
            transform-origin: center center;
            will-change: transform;
        }

        /* Visual Spotlight overlay when security light is active */
        .light-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,240,0.4) 20%, rgba(0,0,0,0.85) 80%);
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.1s ease;
            transform: scale(1.3) translateX(0%); 
            transform-origin: center center;
            will-change: transform;
        }

        .monitor-container.light-on #main-monitor { filter: grayscale(30%) contrast(100%) brightness(120%); }
        .monitor-container.light-on .light-overlay { opacity: 1; }

        /* Red "NO SIGNAL" / Blackout screen */
        .offline-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #070707; color: #ff0000;
            font-size: 2rem;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            font-weight: bold; letter-spacing: 5px;
            text-align: center;
            line-height: 1.5;
        }

        /* Retro TV CRT static */
        .static-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-radial-gradient(circle, #333, #000 2px, #333 4px);
            background-size: 8px 8px;
            opacity: 0.15; pointer-events: none; z-index: 4;
            animation: staticNoise 0.1s infinite;
        }

        /* TV scanlines */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none; z-index: 5;
        }

        .cam-label {
            position: absolute;
            top: 80px; left: 40px;
            font-size: 2rem; font-weight: bold; color: white;
            text-shadow: 2px 2px 0 #000; z-index: 20; letter-spacing: 2px;
        }

        /* Blinking Recording Dot */
        .recording-dot {
            position: absolute;
            top: 85px; right: 40px;
            width: 25px; height: 25px;
            background-color: red;
            border-radius: 50%;
            z-index: 20;
            display: none;
            box-shadow: 0 0 15px red;
            animation: blink 1.5s infinite;
        }

        /* Local Warning Banner for Cam Users */
        .motion-alert-banner {
            position: absolute;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.85);
            color: #fff;
            font-weight: bold;
            padding: 10px 20px;
            font-size: 0.85rem;
            border-radius: 4px;
            display: none;
            z-index: 50;
            box-shadow: 0 0 15px rgba(255,0,0,0.7);
            border: 1px solid white;
            letter-spacing: 1.5px;
            animation: blink 1s infinite;
            text-align: center;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Flashlight Button (Only shown to Guard) */
        #flashlight-btn {
            position: absolute;
            bottom: 40px; left: 40px;
            padding: 20px 40px;
            font-size: 1.5rem; font-family: inherit; font-weight: bold;
            background: rgba(30, 30, 30, 0.85); color: white;
            border: 2px solid white; cursor: pointer;
            z-index: 20; touch-action: none;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
            display: none; 
        }

        #flashlight-btn:active {
            background: white; color: black; box-shadow: 0 0 20px rgba(255,255,240,0.8);
        }

        /* Camera Switcher Map (Only shown to Guard) */
        .camera-map {
            position: absolute;
            bottom: 30px; right: 30px;
            width: 280px;
            border: 2px solid white; background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            display: none; 
            grid-template-columns: 1fr 1fr; gap: 15px; z-index: 20;
        }

        .cam-btn {
            background: rgba(10, 10, 10, 0.6); color: #555;
            border: 1px solid #333; padding: 15px 0; cursor: pointer;
            font-family: inherit; font-size: 0.95rem; font-weight: bold;
            transition: all 0.1s;
        }

        .cam-btn.online { color: #00ff00; border-color: #00ff00; }
        .cam-btn.active {
            background: #fff !important; color: black !important;
            border-color: #fff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Debug Log Terminal */
        .system-log {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 320px;
            height: 90px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #222;
            color: #00ff00;
            font-size: 0.7rem;
            padding: 10px;
            overflow: hidden;
            pointer-events: none;
            z-index: 40;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.3;
            text-shadow: 0 0 2px #00ff00;
        }

        #screen-flash {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            z-index: 100;
            display: none;
            pointer-events: none;
        }

        @keyframes staticNoise {
            0% { transform: translate(0, 0); } 20% { transform: translate(1px, 2px); }
            40% { transform: translate(1px, 1px); } 60% { transform: translate(2px, -1px); }
            80% { transform: translate(1px, 2px); } 100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <div id="screen-flash"></div>

    <!-- Status Bar -->
    <div class="lobby-bar">
        <div>
            ROOM: <span id="room-id-display">...</span> | 
            STATUS: <span id="slot-status">CONNECTING...</span>
        </div>
        <button class="share-btn" onclick="copyRoomLink()">📋 COPY ROOM LINK</button>
    </div>

    <!-- Monitor Arena -->
    <div class="monitor-container">
        <video id="main-monitor" autoplay playsinline muted></video>
        <div class="light-overlay" id="light-overlay"></div>
        <div class="offline-screen" id="offline-screen">NO SIGNAL</div>
        <div class="static-overlay"></div>
        <div class="scanlines"></div>
        
        <div class="cam-label" id="cam-label">LOBBY</div>
        <div class="recording-dot" id="recording-dot"></div>

        <div class="motion-alert-banner" id="motion-alert-banner">⚠️ MOTION DETECTED - FEED SECURED ⚠️</div>
        
        <button id="flashlight-btn" 
                onmousedown="triggerFlashlight(true)" 
                onmouseup="triggerFlashlight(false)"
                onmouseleave="triggerFlashlight(false)"
                ontouchstart="triggerFlashlight(true); event.preventDefault();" 
                ontouchend="triggerFlashlight(false); event.preventDefault();">
            🔦 LIGHT
        </button>
    </div>

    <!-- Scrolling Debug Console -->
    <div class="system-log" id="system-log">> TERMINAL INITIALIZED...</div>

    <!-- Map Grid -->
    <div class="camera-map" id="camera-map">
        <button class="cam-btn active" data-cam="cam1" onclick="switchCamera(event, 'cam1', 'CAM 01')">CAM 01 (OFFLINE)</button>
        <button class="cam-btn" data-cam="cam2" onclick="switchCamera(event, 'cam2', 'CAM 02')">CAM 02 (OFFLINE)</button>
        <button class="cam-btn" data-cam="cam3" onclick="switchCamera(event, 'cam3', 'CAM 03')">CAM 03 (OFFLINE)</button>
        <button class="cam-btn" data-cam="cam4" onclick="switchCamera(event, 'cam4', 'CAM 04')">CAM 04 (OFFLINE)</button>
    </div>

    <script>
        const mainMonitor = document.getElementById('main-monitor');
        const camLabel = document.getElementById('cam-label');
        const offlineScreen = document.getElementById('offline-screen');
        const buttons = document.querySelectorAll('.cam-btn');

        let myRole = null; 
        let localCameraStream = null;
        let currentCamId = 'cam1'; 
        let peer = null;
        let currentSlot = 1;
        let wakeLock = null;

        const connectedStreams = { 'cam1': null, 'cam2': null, 'cam3': null, 'cam4': null };
        const dataConnections = { 'cam1': null, 'cam2': null, 'cam3': null, 'cam4': null };
        const motionStates = { 'cam1': false, 'cam2': false, 'cam3': false, 'cam4': false };

        let guardDataConnection = null; 
        let guardMediaCall = null;

        let motionCanvas = null;
        let motionCtx = null;
        let prevFrameData = null;
        let motionTimeout = null;
        let isCurrentlyMoving = false;
        let ignoreMotionUntil = 0;

        // Room Generation
        let roomHash = window.location.hash.substring(1);
        if (!roomHash) {
            roomHash = "fnaf-" + Math.floor(1000 + Math.random() * 9000);
            window.location.hash = roomHash;
        }
        document.getElementById('room-id-display').innerText = roomHash.toUpperCase();

        function logSystem(msg) {
            console.log(msg);
            const logEl = document.getElementById('system-log');
            if (logEl) {
                const lines = logEl.innerHTML.split('<br>');
                logEl.innerHTML = `> ${msg}<br>` + lines.slice(0, 3).join('<br>');
            }
        }

        function copyRoomLink() {
            navigator.clipboard.writeText(window.location.href);
            document.querySelector('.share-btn').innerText = "COPIED!";
            setTimeout(() => { document.querySelector('.share-btn').innerText = "📋 COPY ROOM LINK"; }, 2000);
        }

        // ==========================================
        // WAKE LOCK CONTROLLER (No sleeping!)
        // ==========================================
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    logSystem("🔋 WAKE LOCK ACTIVE - SCREEN ONLINE");
                } else {
                    logSystem("Wake Lock unsupported on this browser.");
                }
            } catch (err) {
                logSystem(`Wake Lock Error: ${err.message}`);
            }
        }

        // Re-acquire lock if user switches tabs and returns
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // ==========================================
        // GUARD MODE
        // ==========================================
        function tryBecomeGuard() {
            peer = new Peer(`${roomHash}-guard`);

            peer.on('open', (id) => {
                myRole = 'guard';
                document.getElementById('slot-status').innerText = "SECURITY GUARD";
                logSystem("ASSIGNED ROLE: SECURITY GUARD");
                
                document.getElementById('camera-map').style.display = 'grid';
                document.getElementById('flashlight-btn').style.display = 'block';
                camLabel.innerText = "CAM 01";

                requestWakeLock(); // Keep Guard display alive!
                setupGuardListeners();
                updateMonitorFeed();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    initCameraMode();
                } else {
                    logSystem(`GUARD ERROR: ${err.type}`);
                }
            });
        }

        function setupGuardListeners() {
            peer.on('call', (call) => {
                const targetSlot = getSlotFromPeerId(call.peer);
                if (!targetSlot) return;

                logSystem(`FEED ATTEMPT: ${targetSlot.toUpperCase()}`);
                call.answer(); 
                
                call.on('stream', (remoteStream) => {
                    connectedStreams[targetSlot] = remoteStream;
                    logSystem(`${targetSlot.toUpperCase()} FEED STREAMING LIVE`);
                    updateCameraMapUI();
                    updateMonitorFeed();
                });

                call.on('close', () => {
                    connectedStreams[targetSlot] = null;
                    motionStates[targetSlot] = false; 
                    logSystem(`${targetSlot.toUpperCase()} FEED OFFLINE`);
                    updateCameraMapUI();
                    updateMonitorFeed();
                });
            });

            peer.on('connection', (conn) => {
                const targetSlot = getSlotFromPeerId(conn.peer);
                if (!targetSlot) return;

                logSystem(`DATA LINK REQUEST: ${targetSlot.toUpperCase()}`);

                conn.on('open', () => {
                    dataConnections[targetSlot] = conn;
                    logSystem(`${targetSlot.toUpperCase()} CONTROL LINK ACTIVE`);
                    updateCameraMapUI();
                });

                conn.on('data', (data) => {
                    if (data.type === 'motion') {
                        motionStates[targetSlot] = data.state;
                        logSystem(`${targetSlot.toUpperCase()} MOTION: ${data.state ? "TRIGGERED" : "CLEARED"}`);
                        updateCameraMapUI();
                        updateMonitorFeed();
                    }
                });

                conn.on('close', () => {
                    dataConnections[targetSlot] = null;
                    motionStates[targetSlot] = false;
                    logSystem(`${targetSlot.toUpperCase()} DATA LINK TERMINATED`);
                    updateCameraMapUI();
                    updateMonitorFeed();
                });
            });
        }

        // ==========================================
        // CAMERA MODE
        // ==========================================
        async function initCameraMode() {
            myRole = 'cam';
            document.getElementById('slot-status').innerText = "PROBING LENSES...";
            logSystem("ROLE: REMOTE SECURITY CAMERA");
            
            try {
                logSystem("Requesting lens permissions...");
                let tempStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');

                tempStream.getTracks().forEach(t => t.stop());

                logSystem(`PROBING ${videoDevices.length} HARDWARE LENSES...`);
                let foundFlashStream = null;

                for (const device of videoDevices) {
                    try {
                        const testStream = await navigator.mediaDevices.getUserMedia({
                            video: { deviceId: { exact: device.deviceId } }
                        });
                        const testTrack = testStream.getVideoTracks()[0];

                        await new Promise(resolve => setTimeout(resolve, 250));
                        const capabilities = typeof testTrack.getCapabilities === 'function' ? testTrack.getCapabilities() : null;

                        if (capabilities && capabilities.torch) {
                            foundFlashStream = testStream;
                            logSystem(`LOCKED PRIMARY LENS [TORCH OK]`);
                            break; 
                        } else {
                            testTrack.stop();
                        }
                    } catch (e) {
                        console.warn(`Skipping device: ${device.label}`, e);
                    }
                }

                if (foundFlashStream) {
                    localCameraStream = foundFlashStream;
                } else {
                    logSystem("NO NATIVE TORCH DETECTED. INITIATING DEFAULT.");
                    localCameraStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false
                    });
                }

                logSystem("SYSTEM INITIATED");
                tryRegisterCamSlot(1);

            } catch (err) {
                document.getElementById('slot-status').innerText = "CAMERA BLOCKED";
                logSystem("CRITICAL: HARDWARE ACCESS REFUSED");
                console.error(err);
            }
        }

        function tryRegisterCamSlot(slotNum) {
            if (slotNum > 4) {
                document.getElementById('slot-status').innerText = "ROOM FULL";
                logSystem("ROOM FULL (MAX 4 CAMS)");
                return;
            }

            currentSlot = slotNum;
            if (peer) {
                try { peer.destroy(); } catch(e){}
            }

            peer = new Peer(`${roomHash}-cam-${slotNum}`);

            peer.on('open', (id) => {
                document.getElementById('slot-status').innerText = `BROADCASTING`;
                logSystem(`REGISTERED AS CAMERA 0${slotNum}`);
                
                document.getElementById('camera-map').style.display = 'none';
                document.getElementById('flashlight-btn').style.display = 'none';
                document.getElementById('recording-dot').style.display = 'block';
                camLabel.innerText = `CAM 0${slotNum} - RECORDING`;
                
                mainMonitor.srcObject = localCameraStream;
                mainMonitor.style.display = "block";
                offlineScreen.style.display = "none";

                requestWakeLock(); // Keep Camera phone screen awake!

                peer.on('error', (err) => {
                    logSystem(`NET ERROR: ${err.type}`);
                    if (err.type === 'peer-unavailable') {
                        logSystem("GUARD DESK OFFLINE. RETRYING...");
                        setTimeout(camConnectToGuard, 4000);
                    }
                });

                camConnectToGuard();
                initMotionDetection(); 
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    logSystem(`CAM 0${slotNum} OCCUPIED. ESCALATING...`);
                    peer.destroy();
                    // 600ms cooldown ensures standard socket teardown before building next slot
                    setTimeout(() => {
                        tryRegisterCamSlot(slotNum + 1); 
                    }, 600);
                }
            });
        }

        function camConnectToGuard() {
            const guardId = `${roomHash}-guard`;
            logSystem(`LINKING TO DESK...`);

            if (guardDataConnection) { try { guardDataConnection.close(); } catch(e){} }
            if (guardMediaCall) { try { guardMediaCall.close(); } catch(e){} }

            const conn = peer.connect(guardId);
            conn.on('open', () => {
                guardDataConnection = conn;
                logSystem(`LINK SECURED`);
                sendMotionStateToGuard(isCurrentlyMoving);
            });

            conn.on('data', (data) => {
                logSystem(`CMD RECEIVED: ${data.type.toUpperCase()}`);
                if (data.type === 'flashlight') {
                    toggleDeviceFlashlight(localCameraStream, data.state);
                }
            });

            conn.on('close', () => {
                logSystem(`LINK LOST. RECONNECTING...`);
                setTimeout(camConnectToGuard, 4000);
            });

            guardMediaCall = peer.call(guardId, localCameraStream);
        }

        // ==========================================
        // MOTION DETECTION
        // ==========================================
        function initMotionDetection() {
            motionCanvas = document.createElement('canvas');
            motionCanvas.width = 48;  
            motionCanvas.height = 36;
            motionCtx = motionCanvas.getContext('2d');

            setInterval(analyzeCameraMovementFrame, 150);
        }

        function analyzeCameraMovementFrame() {
            if (!localCameraStream || !mainMonitor || mainMonitor.paused || mainMonitor.ended) return;
            if (Date.now() < ignoreMotionUntil) {
                prevFrameData = null; 
                return; 
            }

            try {
                motionCtx.drawImage(mainMonitor, 0, 0, motionCanvas.width, motionCanvas.height);
                const currentFrame = motionCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
                const data = currentFrame.data;

                if (prevFrameData) {
                    let changedPixels = 0;
                    const totalPixels = motionCanvas.width * motionCanvas.height;

                    for (let i = 0; i < data.length; i += 4) {
                        const r1 = data[i], g1 = data[i+1], b1 = data[i+2];
                        const r2 = prevFrameData[i], g2 = prevFrameData[i+1], b2 = prevFrameData[i+2];

                        const bright1 = (r1 + g1 + b1) / 3;
                        const bright2 = (r2 + g2 + b2) / 3;

                        if (Math.abs(bright1 - bright2) > 22) { 
                            changedPixels++;
                        }
                    }

                    const changeRatio = changedPixels / totalPixels;
                    if (changeRatio > 0.05) {
                        triggerMotionState(true);
                    } else {
                        triggerMotionState(false);
                    }
                }
                prevFrameData = new Uint8ClampedArray(data); 
            } catch (e) {}
        }

        function triggerMotionState(movingNow) {
            if (movingNow) {
                if (motionTimeout) {
                    clearTimeout(motionTimeout);
                    motionTimeout = null;
                }

                if (!isCurrentlyMoving) {
                    isCurrentlyMoving = true;
                    logSystem("⚠️ MOTION REGISTERED!");
                    sendMotionStateToGuard(true);
                    updateLocalMotionAlertUI(true);
                }
            } else {
                if (isCurrentlyMoving && !motionTimeout) {
                    motionTimeout = setTimeout(() => {
                        isCurrentlyMoving = false;
                        logSystem("MOTION CLEARED.");
                        sendMotionStateToGuard(false);
                        updateLocalMotionAlertUI(false);
                        motionTimeout = null;
                    }, 1500); 
                }
            }
        }

        // ==========================================
        // MOTORIZED PANNING SYSTEM (FNAF Style)
        // ==========================================
        let currentPan = 0;
        let targetPan = 0;
        let touchStartX = 0;
        let basePan = 0;

        window.addEventListener('mousemove', (e) => {
            const percent = e.clientX / window.innerWidth;
            targetPan = (0.5 - percent) * 24; 
        });

        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            basePan = targetPan;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const touchX = e.touches[0].clientX;
            const deltaX = touchX - touchStartX;
            const deltaPercent = (deltaX / window.innerWidth) * 24;
            targetPan = Math.max(-12, Math.min(12, basePan + deltaPercent));
        }, { passive: true });

        function panAnimateLoop() {
            currentPan += (targetPan - currentPan) * 0.04; 

            if (mainMonitor) {
                mainMonitor.style.transform = `scale(1.3) translateX(${currentPan}%)`;
            }
            const lightOverlay = document.getElementById('light-overlay');
            if (lightOverlay) {
                lightOverlay.style.transform = `scale(1.3) translateX(${currentPan * 1.08}%)`;
            }
            requestAnimationFrame(panAnimateLoop);
        }

        panAnimateLoop();

        // ==========================================
        // UTILITIES
        // ==========================================
        function getSlotFromPeerId(peerId) {
            const index = peerId.lastIndexOf('-cam-');
            if (index === -1) return null;
            const slotNum = peerId.substring(index + 5); 
            return 'cam' + slotNum;
        }

        function sendMotionStateToGuard(active) {
            if (guardDataConnection && guardDataConnection.open) {
                guardDataConnection.send({ type: 'motion', state: active });
            }
        }

        function updateLocalMotionAlertUI(isMoving) {
            const banner = document.getElementById('motion-alert-banner');
            if (banner) {
                banner.style.display = isMoving ? 'block' : 'none';
            }
        }

        function updateMonitorFeed() {
            if (myRole !== 'guard') return; 

            const isBlackedOut = motionStates[currentCamId];

            if (isBlackedOut) {
                mainMonitor.srcObject = null;
                mainMonitor.style.display = "none";
                offlineScreen.innerHTML = "<div style='color:#ff0000; font-size:1.8rem; text-shadow: 0 0 10px red;'>MOTION DETECTED<br><span style='font-size:1.1rem; color:#555; text-shadow:none;'>VIDEO FEED SUSPENDED</span></div>";
                offlineScreen.style.display = "flex";
                return;
            }

            if (connectedStreams[currentCamId]) {
                mainMonitor.srcObject = connectedStreams[currentCamId];
                mainMonitor.style.display = "block";
                offlineScreen.style.display = "none";
            } else {
                mainMonitor.srcObject = null;
                mainMonitor.style.display = "none";
                offlineScreen.innerHTML = "NO SIGNAL";
                offlineScreen.style.display = "flex";
            }
        }

        function updateCameraMapUI() {
            for (let i = 1; i <= 4; i++) {
                const slotKey = 'cam' + i;
                const btn = document.querySelector(`.cam-btn[data-cam="${slotKey}"]`);
                if (!btn) continue;
                
                // Show camera as ONLINE if we have either a live stream OR a live control socket
                if (connectedStreams[slotKey] || dataConnections[slotKey]) {
                    btn.classList.add('online');
                    
                    if (motionStates[slotKey]) {
                        btn.style.color = "#ff2222";
                        btn.style.borderColor = "#ff2222";
                        btn.innerText = `CAM 0${i} (MOTION)`;
                    } else {
                        btn.style.color = "";
                        btn.style.borderColor = "";
                        btn.innerText = `CAM 0${i}`;
                    }
                } else {
                    btn.classList.remove('online');
                    btn.style.color = "";
                    btn.style.borderColor = "";
                    btn.innerText = `CAM 0${i} (OFFLINE)`;
                }
            }
        }

        function switchCamera(event, camId, labelText) {
            if (myRole !== 'guard') return;

            triggerFlashlight(false); 
            currentCamId = camId;
            camLabel.innerText = labelText;
            updateMonitorFeed();

            buttons.forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.cam-btn[data-cam="${camId}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        async function toggleDeviceFlashlight(stream, turnOn) {
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            if (!track) return;

            ignoreMotionUntil = Date.now() + 1200;

            try {
                if (typeof track.getCapabilities !== 'function') {
                    logSystem("FLASH FALLBACK ENGAGED");
                    triggerScreenFlash(turnOn);
                    return;
                }

                const capabilities = track.getCapabilities();
                if (capabilities && capabilities.torch) {
                    await track.applyConstraints({ advanced: [{ torch: turnOn }] });
                } else {
                    triggerScreenFlash(turnOn);
                }
            } catch (err) { 
                triggerScreenFlash(turnOn);
            }
        }

        function triggerScreenFlash(turnOn) {
            const flashEl = document.getElementById('screen-flash');
            if (!flashEl) return;
            flashEl.style.display = turnOn ? 'block' : 'none';
        }

        function triggerFlashlight(isPressed) {
            if (myRole !== 'guard') return;

            const monitorContainer = document.querySelector('.monitor-container');
            if (isPressed) monitorContainer.classList.add('light-on');
            else monitorContainer.classList.remove('light-on');
            
            const conn = dataConnections[currentCamId];
            if (conn) {
                try {
                    conn.send({ type: 'flashlight', state: isPressed });
                } catch (e) {
                    logSystem(`ERROR SENDING LIGHT`);
                }
            }
        }

        window.addEventListener('beforeunload', () => { if (peer) peer.destroy(); });

        // Initialize Guard Application
        window.onload = tryBecomeGuard;
    </script>
</body>
</html>
