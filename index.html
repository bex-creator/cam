<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNAF Security Cameras</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            /* Prevents pull-to-refresh on mobile devices */
            overscroll-behavior-y: contain; 
        }

        .monitor-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
        }

        /* The actual video feed */
        #main-monitor {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(70%) contrast(140%) brightness(80%);
        }

        /* FNAF Scanline Overlay */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none; /* Allows clicks to pass through */
            z-index: 10;
        }

        .cam-label {
            position: absolute;
            top: 30px;
            left: 40px;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 20;
            letter-spacing: 2px;
        }

        /* Flashlight Button - FNAF 2 Style */
        #flashlight-btn {
            position: absolute;
            bottom: 40px;
            left: 40px;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            font-weight: bold;
            background: rgba(30, 30, 30, 0.8);
            color: white;
            border: 2px solid white;
            cursor: pointer;
            user-select: none;
            z-index: 20;
            touch-action: none; /* Stops mobile browser zooming on double-tap */
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        #flashlight-btn:active {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        /* Camera Map Switcher */
        .camera-map {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 250px;
            border: 2px solid white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            z-index: 20;
        }

        .cam-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
            padding: 15px 0;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background 0.1s;
        }

        .cam-btn.active {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <!-- Monitor View -->
    <div class="monitor-container">
        <video id="main-monitor" autoplay playsinline muted></video>
        <div class="scanlines"></div>
        <div class="cam-label" id="cam-label">CAM 01</div>
        
        <!-- Flashlight handles both mouse clicks (PC) and finger taps (Mobile) -->
        <button id="flashlight-btn" 
                onmousedown="triggerFlashlight(true)" 
                onmouseup="triggerFlashlight(false)"
                onmouseleave="triggerFlashlight(false)"
                ontouchstart="triggerFlashlight(true); event.preventDefault();" 
                ontouchend="triggerFlashlight(false); event.preventDefault();">
            💡 LIGHT
        </button>
    </div>

    <!-- Camera Navigation Map -->
    <div class="camera-map">
        <button class="cam-btn active" onclick="switchCamera(event, 'cam1', 'CAM 01')">CAM 01</button>
        <button class="cam-btn" onclick="switchCamera(event, 'cam2', 'CAM 02')">CAM 02</button>
        <button class="cam-btn" onclick="switchCamera(event, 'cam3', 'CAM 03')">CAM 03</button>
        <button class="cam-btn" onclick="switchCamera(event, 'cam4', 'CAM 04')">CAM 04</button>
    </div>

    <script>
        const mainMonitor = document.getElementById('main-monitor');
        const camLabel = document.getElementById('cam-label');
        const buttons = document.querySelectorAll('.cam-btn');

        let localCameraStream = null;
        let currentCamId = 'cam1'; 

        // Dictionary to store the feeds (Simulates multiplayer slots)
        const connectedStreams = {
            'cam1': null, 
            'cam2': null,
            'cam3': null,
            'cam4': null
        };

        // 1. Smart Camera Setup with PC Fallback
        async function startBroadcasting() {
            try {
                // Attempt A: Request the rear "environment" camera (Works on Mobile)
                localCameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                console.log("Rear phone camera active.");
            } catch (err) {
                console.log("Rear camera failed or not present. Activating standard PC webcam fallback...");
                
                try {
                    // Attempt B: Request any standard webcam (Works on PC/Laptop)
                    localCameraStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        },
                        audio: false
                    });
                    console.log("PC webcam active.");
                } catch (fallbackErr) {
                    console.error("Camera access completely blocked: ", fallbackErr);
                    camLabel.innerText = "ERROR: NO SIGNAL";
                    return;
                }
            }
            
            // Put our camera feed onto CAM 01 slot immediately
            connectedStreams['cam1'] = localCameraStream;
            mainMonitor.srcObject = connectedStreams['cam1'];
        }

        // 2. Camera Switching Logic
        function switchCamera(event, camId, labelText) {
            currentCamId = camId;
            camLabel.innerText = labelText;

            // Push active stream to the monitor
            if (connectedStreams[camId]) {
                mainMonitor.srcObject = connectedStreams[camId];
            } else {
                mainMonitor.srcObject = null; // Blank black screen if nobody is connected to that camera
            }

            // Update UI buttons styling
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // 3. Hardware Torch controller
        async function toggleDeviceFlashlight(stream, turnOn) {
            if (!stream) return;
            
            const videoTrack = stream.getVideoTracks()[0];
            const capabilities = videoTrack.getCapabilities();

            // Toggle only if the camera has physical flash capabilities (usually only phones)
            if (capabilities.torch) {
                try {
                    await videoTrack.applyConstraints({
                        advanced: [{ torch: turnOn }]
                    });
                } catch (err) {
                    console.error("Failed to toggle flashlight: ", err);
                }
            }
        }

        // 4. Trigger flashlight events
        function triggerFlashlight(isPressed) {
            // Only fire if the active camera stream matches the user's camera stream
            if (connectedStreams[currentCamId] === localCameraStream) {
                toggleDeviceFlashlight(localCameraStream, isPressed);
            }
        }

        // Start everything up on load
        window.onload = startBroadcasting;
    </script>
</body>
</html>
