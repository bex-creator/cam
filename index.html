<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNAF Multiplayer Security Cameras</title>
    
    <!-- PeerJS for P2P networking -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            overscroll-behavior-y: contain; 
            user-select: none;
        }

        /* Top Retro Status Console */
        .lobby-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 30;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .share-btn {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .share-btn:hover {
            background: #00ff00;
            color: black;
        }

        #slot-status {
            color: #ffcc00;
            font-weight: bold;
        }

        .monitor-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
        }

        /* The Live Feed styling */
        #main-monitor {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(60%) contrast(140%) brightness(70%);
            z-index: 1;
        }

        /* Visual Spotlight overlay when security light is active */
        .light-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,240,0.4) 20%, rgba(0,0,0,0.85) 80%);
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        /* Dynamic flashlight classes */
        .monitor-container.light-on #main-monitor {
            filter: grayscale(30%) contrast(100%) brightness(120%);
        }

        .monitor-container.light-on .light-overlay {
            opacity: 1;
        }

        /* Red "NO SIGNAL" screen when a camera is empty */
        .offline-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #070707;
            color: #ff0000;
            font-size: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            font-weight: bold;
            letter-spacing: 5px;
        }

        /* Retro TV CRT static overlay */
        .static-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle, #333, #000 2px, #333 4px);
            background-size: 8px 8px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 4;
            animation: staticNoise 0.1s infinite;
        }

        /* TV scanlines overlay */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }

        .cam-label {
            position: absolute;
            top: 80px;
            left: 40px;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #000;
            z-index: 20;
            letter-spacing: 2px;
        }

        /* Flashlight / Light Button */
        #flashlight-btn {
            position: absolute;
            bottom: 40px;
            left: 40px;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            font-weight: bold;
            background: rgba(30, 30, 30, 0.85);
            color: white;
            border: 2px solid white;
            cursor: pointer;
            z-index: 20;
            touch-action: none;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        #flashlight-btn:active {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        /* Camera Nav Map */
        .camera-map {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 280px;
            border: 2px solid white;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            z-index: 20;
        }

        .cam-btn {
            background: rgba(10, 10, 10, 0.6);
            color: #555;
            border: 1px solid #333;
            padding: 15px 0;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: bold;
            transition: all 0.1s;
        }

        .cam-btn.online {
            color: #00ff00;
            border-color: #00ff00;
        }

        .cam-btn.active {
            background: #fff !important;
            color: black !important;
            border-color: #fff !important;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes staticNoise {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-1px, -1px); }
            20% { transform: translate(1px, 2px); }
            30% { transform: translate(-2px, -2px); }
            40% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, 2px); }
            60% { transform: translate(2px, -1px); }
            70% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 2px); }
            90% { transform: translate(-2px, -2px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

    <!-- Upper Control Bar -->
    <div class="lobby-bar">
        <div>
            ROOM: <span id="room-id-display">...</span> | 
            STATUS: <span id="slot-status">INIT CAMERA...</span>
        </div>
        <button class="share-btn" onclick="copyRoomLink()">📋 COPY ROOM LINK</button>
    </div>

    <!-- Monitor View -->
    <div class="monitor-container">
        <video id="main-monitor" autoplay playsinline muted></video>
        <div class="light-overlay" id="light-overlay"></div>
        <div class="offline-screen" id="offline-screen">NO SIGNAL</div>
        <div class="static-overlay"></div>
        <div class="scanlines"></div>
        
        <div class="cam-label" id="cam-label">CAM 01</div>
        
        <!-- Flashlight triggers (Desktop and Mobile) -->
        <button id="flashlight-btn" 
                onmousedown="triggerFlashlight(true)" 
                onmouseup="triggerFlashlight(false)"
                onmouseleave="triggerFlashlight(false)"
                ontouchstart="triggerFlashlight(true); event.preventDefault();" 
                ontouchend="triggerFlashlight(false); event.preventDefault();">
            🔦 LIGHT
        </button>
    </div>

    <!-- Camera Switcher Grid -->
    <div class="camera-map">
        <button class="cam-btn active" data-cam="cam1" onclick="switchCamera(event, 'cam1', 'CAM 01')">CAM 01 (OFFLINE)</button>
        <button class="cam-btn" data-cam="cam2" onclick="switchCamera(event, 'cam2', 'CAM 02')">CAM 02 (OFFLINE)</button>
        <button class="cam-btn" data-cam="cam3" onclick="switchCamera(event, 'cam3', 'CAM 03')">CAM 03 (OFFLINE)</button>
        <button class="cam-btn" data-cam="cam4" onclick="switchCamera(event, 'cam4', 'CAM 04')">CAM 04 (OFFLINE)</button>
    </div>

    <script>
        const mainMonitor = document.getElementById('main-monitor');
        const camLabel = document.getElementById('cam-label');
        const offlineScreen = document.getElementById('offline-screen');
        const buttons = document.querySelectorAll('.cam-btn');

        let localCameraStream = null;
        let currentCamId = 'cam1'; 
        let peer = null;
        let currentSlot = 1;

        const connectedStreams = { 'cam1': null, 'cam2': null, 'cam3': null, 'cam4': null };
        const dataConnections = { 'cam1': null, 'cam2': null, 'cam3': null, 'cam4': null };

        // 1. Room Logic
        let roomHash = window.location.hash.substring(1);
        if (!roomHash) {
            roomHash = "fnaf-" + Math.floor(1000 + Math.random() * 9000);
            window.location.hash = roomHash;
        }
        document.getElementById('room-id-display').innerText = roomHash.toUpperCase();

        function copyRoomLink() {
            navigator.clipboard.writeText(window.location.href);
            const btn = document.querySelector('.share-btn');
            btn.innerText = "COPIED!";
            setTimeout(() => { btn.innerText = "📋 COPY ROOM LINK"; }, 2000);
        }

        // 2. Start Camera
        async function startBroadcasting() {
            try {
                // Try strictly for the Android Back Camera first
                localCameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
            } catch (err) {
                console.log("Rear camera failed. Trying default PC fallback...");
                try {
                    // Fallback for PCs
                    localCameraStream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false
                    });
                } catch (fallbackErr) {
                    document.getElementById('slot-status').innerText = "CAMERA BLOCKED";
                    return;
                }
            }
            tryRegisterSlot(1);
        }

        // 3. Register multiplayer slot
        function tryRegisterSlot(slotNum) {
            if (slotNum > 4) {
                document.getElementById('slot-status').innerText = "ROOM FULL (4/4)";
                return;
            }

            document.getElementById('slot-status').innerText = `RESERVING CAM 0${slotNum}...`;
            const peerId = `${roomHash}-cam-${slotNum}`;
            peer = new Peer(peerId);

            peer.on('open', (id) => {
                currentSlot = slotNum;
                document.getElementById('slot-status').innerText = `CONNECTED AS CAM 0${slotNum}`;
                
                // Add ourselves to the map
                connectedStreams['cam' + currentSlot] = localCameraStream;
                updateCameraMapUI();
                updateMonitorFeed();

                connectToOtherPeers();
                setupNetworkListeners();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    tryRegisterSlot(slotNum + 1); // Try next slot if taken
                }
            });
        }

        // 4. Mesh Networking
        function connectToOtherPeers() {
            for (let i = 1; i <= 4; i++) {
                if (i === currentSlot) continue;
                
                const targetId = `${roomHash}-cam-${i}`;
                const targetSlot = 'cam' + i;

                // Send video stream
                const call = peer.call(targetId, localCameraStream);
                if (call) handleIncomingCall(call, targetSlot);

                // Send data channel (for flashlight signal)
                const conn = peer.connect(targetId);
                if (conn) handleIncomingData(conn, targetSlot);
            }
        }

        function getSlotFromPeerId(peerId) {
            const parts = peerId.split('-cam-');
            return parts.length === 2 ? 'cam' + parts[1] : null;
        }

        function setupNetworkListeners() {
            peer.on('call', (call) => {
                const targetSlot = getSlotFromPeerId(call.peer);
                if (!targetSlot) return;
                call.answer(localCameraStream); 
                handleIncomingCall(call, targetSlot);
            });

            peer.on('connection', (conn) => {
                const targetSlot = getSlotFromPeerId(conn.peer);
                if (!targetSlot) return;
                handleIncomingData(conn, targetSlot);
            });
        }

        function handleIncomingCall(call, targetSlot) {
            call.on('stream', (remoteStream) => {
                connectedStreams[targetSlot] = remoteStream;
                updateCameraMapUI();
                updateMonitorFeed();
            });
            call.on('close', () => {
                connectedStreams[targetSlot] = null;
                updateCameraMapUI();
                updateMonitorFeed();
            });
        }

        function handleIncomingData(conn, targetSlot) {
            dataConnections[targetSlot] = conn;
            conn.on('data', (data) => {
                if (data.type === 'flashlight') {
                    // Turn our Android physical light on/off based on the signal received!
                    toggleDeviceFlashlight(localCameraStream, data.state);
                }
            });
        }

        // 5. Update UI
        function updateMonitorFeed() {
            if (connectedStreams[currentCamId]) {
                mainMonitor.srcObject = connectedStreams[currentCamId];
                mainMonitor.style.display = "block";
                offlineScreen.style.display = "none";
            } else {
                mainMonitor.srcObject = null;
                mainMonitor.style.display = "none";
                offlineScreen.style.display = "flex";
            }
        }

        function updateCameraMapUI() {
            for (let i = 1; i <= 4; i++) {
                const btn = document.querySelector(`.cam-btn[data-cam="cam${i}"]`);
                if (!btn) continue;
                
                if (connectedStreams['cam' + i]) {
                    btn.classList.add('online');
                    btn.innerText = i === currentSlot ? `CAM 0${i} (YOU)` : `CAM 0${i}`;
                } else {
                    btn.classList.remove('online');
                    btn.innerText = `CAM 0${i} (OFFLINE)`;
                }
            }
        }

        // 6. Camera Switch Controls
        function switchCamera(event, camId, labelText) {
            triggerFlashlight(false); // Turn off light when switching cameras
            currentCamId = camId;
            camLabel.innerText = labelText;
            updateMonitorFeed();

            buttons.forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.cam-btn[data-cam="${camId}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        // 7. Physical Android Torch Controller
        async function toggleDeviceFlashlight(stream, turnOn) {
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            if (!track) return;

            try {
                // Ensure the capability exists before applying it
                const capabilities = track.getCapabilities();
                if (capabilities.torch !== undefined) {
                    await track.applyConstraints({
                        advanced: [{ torch: turnOn }]
                    });
                }
            } catch (err) {
                console.warn("Failed to toggle hardware light: ", err);
            }
        }

        // 8. Light Button Logic
        function triggerFlashlight(isPressed) {
            const monitorContainer = document.querySelector('.monitor-container');
            
            // Visual overlay effect on our own screen
            if (isPressed) {
                monitorContainer.classList.add('light-on');
            } else {
                monitorContainer.classList.remove('light-on');
            }
            
            // Route the signal
            if (currentCamId === 'cam' + currentSlot) {
                // We are viewing our own camera, trigger light locally
                toggleDeviceFlashlight(localCameraStream, isPressed);
            } else {
                // We are viewing someone else, send signal to their phone
                const conn = dataConnections[currentCamId];
                if (conn && conn.open) {
                    conn.send({ type: 'flashlight', state: isPressed });
                }
            }
        }

        window.addEventListener('beforeunload', () => {
            if (peer) peer.destroy();
        });

        window.onload = startBroadcasting;
    </script>
</body>
</html>
