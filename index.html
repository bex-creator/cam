<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNAF Multiplayer Security Cameras</title>
    
    <!-- PeerJS for P2P networking -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            margin: 0;
            overscroll-behavior-y: contain; 
            user-select: none;
        }

        /* Top Retro Status Console */
        .lobby-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid #333;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 60;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .share-btn {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            transition: all 0.2s;
        }

        .share-btn:hover { background: #00ff00; color: black; }
        #slot-status { color: #ffcc00; font-weight: bold; }

        .monitor-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            overflow: hidden; 
            transition: opacity 0.3s;
        }

        /* Video Feed */
        #main-monitor {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(60%) contrast(140%) brightness(70%);
            z-index: 1;
            transform: scale(1.3) translateX(0%); 
            transform-origin: center center;
            will-change: transform;
        }

        /* Light Overlay */
        .light-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,240,0.4) 20%, rgba(0,0,0,0.85) 80%);
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.1s ease;
            transform: scale(1.3) translateX(0%); 
            transform-origin: center center;
            will-change: transform;
        }

        .monitor-container.light-on #main-monitor { filter: grayscale(30%) contrast(100%) brightness(120%); }
        .monitor-container.light-on .light-overlay { opacity: 1; }

        /* Offline Screen */
        .offline-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #070707; color: #ff0000;
            font-size: 2rem;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 3;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            font-weight: bold; letter-spacing: 5px;
            text-align: center;
            line-height: 1.5;
        }

        /* Heavy Static for Motion Detection */
        .motion-static-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-radial-gradient(circle, #fff, #111 2px, #fff 4px), repeating-linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.3) 2px, transparent 2px, transparent 4px);
            background-size: 15px 15px, 100% 4px;
            opacity: 0.85; 
            z-index: 4;
            display: none;
            pointer-events: none;
            animation: intenseStatic 0.05s infinite;
        }

        @keyframes intenseStatic {
            0% { background-position: 0 0, 0 0; }
            50% { background-position: 5px 10px, 0 2px; }
            100% { background-position: -5px -5px, 0 4px; }
        }

        /* Ambient scanlines */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none; z-index: 5;
        }

        .cam-label {
            position: absolute;
            top: 80px; left: 40px;
            font-size: 2rem; font-weight: bold; color: white;
            text-shadow: 2px 2px 0 #000; z-index: 20; letter-spacing: 2px;
        }

        /* Recording Dot for Phones */
        .recording-dot {
            position: absolute;
            top: 85px; right: 40px;
            width: 25px; height: 25px;
            background-color: red;
            border-radius: 50%;
            z-index: 20; display: none;
            box-shadow: 0 0 15px red; animation: blink 1.5s infinite;
        }

        /* Local Warning Banner for Cam Users */
        .motion-alert-banner {
            position: absolute;
            top: 130px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.85); color: #fff;
            font-weight: bold; padding: 10px 20px; font-size: 0.85rem;
            border-radius: 4px; display: none; z-index: 50;
            box-shadow: 0 0 15px rgba(255,0,0,0.7); border: 1px solid white;
            letter-spacing: 1.5px; animation: blink 1s infinite; text-align: center;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* FNAF HUD Elements */
        .guard-hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 30; display: none;
        }

        .time-display {
            position: absolute;
            top: 60px; right: 40px;
            font-size: 3rem; font-weight: bold;
            text-shadow: 2px 2px 0 #000; letter-spacing: 2px;
        }
        
        .night-display {
            position: absolute;
            top: 110px; right: 45px;
            font-size: 1.2rem; font-weight: bold;
            text-shadow: 2px 2px 0 #000; letter-spacing: 1px;
        }

        .power-display {
            position: absolute;
            bottom: 40px; left: 40px;
            font-size: 1.5rem; font-weight: bold;
            text-shadow: 2px 2px 0 #000; line-height: 1.5;
        }

        /* Controls */
        #flashlight-btn {
            position: absolute;
            bottom: 40px; left: 250px;
            padding: 15px 30px;
            font-size: 1.2rem; font-family: inherit; font-weight: bold;
            background: rgba(30, 30, 30, 0.85); color: white;
            border: 2px solid white; cursor: pointer; pointer-events: auto;
            touch-action: none; box-shadow: 0 0 10px rgba(255,255,255,0.2);
            display: none; 
        }
        #flashlight-btn:active { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,240,0.8); }

        #toggle-monitor-btn {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 60px; font-size: 1.2rem; font-family: inherit; font-weight: bold;
            background: rgba(255, 255, 255, 0.2); color: white; border: 2px solid white;
            cursor: pointer; pointer-events: auto; transition: background 0.2s;
            display: none;
        }
        #toggle-monitor-btn:hover { background: rgba(255,255,255,0.4); }

        .camera-map {
            position: absolute;
            bottom: 120px; right: 30px;
            width: 280px;
            border: 2px solid white; background: rgba(0, 0, 0, 0.8);
            padding: 15px; display: none; pointer-events: auto;
            grid-template-columns: 1fr 1fr; gap: 15px; 
        }

        .cam-btn {
            background: rgba(10, 10, 10, 0.6); color: #555;
            border: 1px solid #333; padding: 15px 0; cursor: pointer;
            font-family: inherit; font-size: 0.95rem; font-weight: bold; transition: all 0.1s;
        }
        .cam-btn.online { color: #00ff00; border-color: #00ff00; }
        .cam-btn.active {
            background: #fff !important; color: black !important;
            border-color: #fff !important; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Generator Outage Repair Button (For Guard) */
        #repair-grid-btn {
            position: absolute;
            bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 20px 40px; font-size: 1.3rem; font-family: inherit; font-weight: bold;
            background: #ff0000; color: white; border: 3px solid white;
            cursor: pointer; pointer-events: auto; animation: blink 1s infinite;
            display: none; z-index: 120; box-shadow: 0 0 20px rgba(255,0,0,0.8);
        }

        /* Generator Saboteur controls (For Player 2/CAM 1) */
        #cam-controls {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 80; display: none; text-align: center; pointer-events: auto;
        }
        #sabotage-btn {
            padding: 18px 36px; font-size: 1.1rem; font-family: inherit; font-weight: bold;
            background: #990000; color: white; border: 2px solid red; cursor: pointer;
            border-radius: 5px; box-shadow: 0 0 20px rgba(255,0,0,0.6);
            transition: all 0.2s;
        }
        #sabotage-btn:disabled { background: #222; border-color: #555; color: #555; box-shadow: none; cursor: default; }

        /* Power Out Sabotage Overlay */
        #power-out-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); z-index: 95; display: none; pointer-events: none;
        }

        /* Pure Black Death Screen Overlay (No Text, Covers Everything) */
        #death-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #000000; z-index: 200;
            display: none; pointer-events: none;
        }

        #win-screen {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: #000; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 101;
            font-size: 5rem; letter-spacing: 5px; font-weight: bold; text-shadow: 0 0 20px #fff;
            display: none; opacity: 0; transition: opacity 3s;
        }

        /* Wire Repair Minigame Box */
        #wire-minigame {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.98);
            z-index: 150;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        #wire-board {
            position: relative;
            width: 300px; height: 400px;
            background: #252525; border: 4px solid #444;
            border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.8);
            touch-action: none;
        }
        #wire-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .system-log {
            position: absolute; top: 60px; left: 30px;
            width: 300px; height: 90px;
            background: rgba(0, 0, 0, 0.6); border: 1px solid #222;
            color: #00ff00; font-size: 0.65rem; padding: 10px; overflow: hidden;
            pointer-events: none; z-index: 40; line-height: 1.3; text-shadow: 0 0 2px #00ff00;
        }

        #screen-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ffffff; z-index: 100; display: none; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="screen-flash"></div>

    <div class="lobby-bar">
        <div>ROOM: <span id="room-id-display">...</span> | STATUS: <span id="slot-status">CONNECTING...</span></div>
        <button class="share-btn" onclick="copyRoomLink()">📋 COPY ROOM LINK</button>
    </div>

    <!-- Monitor Arena -->
    <div class="monitor-container" id="monitor-container">
        <video id="main-monitor" autoplay playsinline muted></video>
        <div class="light-overlay" id="light-overlay"></div>
        <div class="motion-static-overlay" id="motion-static-overlay"></div>
        <div class="offline-screen" id="offline-screen">SYSTEM OFFLINE</div>
        <div class="scanlines"></div>
        
        <div class="cam-label" id="cam-label">LOBBY</div>
        <div class="recording-dot" id="recording-dot"></div>
        <div class="motion-alert-banner" id="motion-alert-banner">⚠️ MOTION DETECTED - STATIC INTERFERENCE ⚠️</div>
    </div>

    <!-- Animatronic / Saboteur Interface controls -->
    <div id="cam-controls">
        <button id="sabotage-btn" onclick="triggerSabotage()">⚡ SABOTAGE GENERATOR (1/1)</button>
    </div>

    <!-- Guard HUD Elements -->
    <div class="guard-hud" id="guard-hud">
        <div class="time-display" id="time-display">12 AM</div>
        <div class="night-display">Night 1</div>
        
        <div class="power-display">
            Power left: <span id="power-pct">100</span>%<br>
            Usage: <span id="usage-bars">🟩</span>
        </div>

        <button id="flashlight-btn" 
                onmousedown="triggerFlashlight(true)" onmouseup="triggerFlashlight(false)"
                onmouseleave="triggerFlashlight(false)"
                ontouchstart="triggerFlashlight(true); event.preventDefault();" 
                ontouchend="triggerFlashlight(false); event.preventDefault();">
            🔦 LIGHT
        </button>

        <button id="toggle-monitor-btn" onclick="toggleMonitor()">MONITOR</button>
        <button id="repair-grid-btn" onclick="openWirePuzzle()">🔧 REPAIR GENERATOR</button>

        <div class="camera-map" id="camera-map">
            <button class="cam-btn active" data-cam="cam1" onclick="switchCamera(event, 'cam1', 'CAM 01 (GEN ROOM)')">CAM 01</button>
            <button class="cam-btn" data-cam="cam2" onclick="switchCamera(event, 'cam2', 'CAM 02')">CAM 02</button>
            <button class="cam-btn" data-cam="cam3" onclick="switchCamera(event, 'cam3', 'CAM 03')">CAM 03</button>
            <button class="cam-btn" data-cam="cam4" onclick="switchCamera(event, 'cam4', 'CAM 04')">CAM 04</button>
        </div>
    </div>

    <!-- Wire Sorting Minigame Modal -->
    <div id="wire-minigame">
        <div style="font-size: 1.2rem; color: #ff3333; margin-bottom: 20px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 5px red;">⚠️ REWIRING SYSTEM JUNCTION ⚠️</div>
        <div id="wire-board">
            <canvas id="wire-canvas"></canvas>
        </div>
        <button onclick="document.getElementById('wire-minigame').style.display='none'" style="margin-top:25px; padding:12px 24px; background:#333; color:white; border:2px solid #555; cursor:pointer; font-family:inherit; font-weight:bold;">RETURN TO DESK</button>
    </div>

    <!-- Full Screen Events -->
    <div id="power-out-screen"></div>
    <div id="death-screen"></div>
    <div id="win-screen">5 AM...<br><span style="font-size:6rem; margin-top:20px;">6 AM</span><br><span style="font-size:1.5rem; margin-top:20px;">NIGHT SURVIVED</span></div>

    <!-- Debug Console -->
    <div class="system-log" id="system-log">> TERMINAL INITIALIZED...</div>

    <script>
        const mainMonitor = document.getElementById('main-monitor');
        const camLabel = document.getElementById('cam-label');
        const offlineScreen = document.getElementById('offline-screen');
        const motionStaticOverlay = document.getElementById('motion-static-overlay');
        const buttons = document.querySelectorAll('.cam-btn');

        let myRole = null; 
        let localCameraStream = null;
        let currentCamId = 'cam1'; 
        let peer = null;
        let currentSlot = 1;
        let wakeLock = null;

        const connectedStreams = { 'cam1': null, 'cam2': null, 'cam3': null, 'cam4': null };
        const dataConnections = { 'cam1': null, 'cam2': null, 'cam3': null, 'cam4': null };
        const motionStates = { 'cam1': false, 'cam2': false, 'cam3': false, 'cam4': false };

        let guardDataConnection = null; 
        let guardMediaCall = null;

        // Motion analysis variables
        let motionCanvas = null;
        let motionCtx = null;
        let prevFrameData = null;
        let motionTimeout = null;
        let isCurrentlyMoving = false;
        let ignoreMotionUntil = 0;

        // FNAF Game State Mechanics
        let gameActive = false;
        let isMonitorUp = true;
        let isLightOn = false;
        let isPowerOut = false;
        let currentHour = 0; // 0 = 12 AM
        let gameTick = 0;
        let powerLevel = 100.0;

        let roomHash = window.location.hash.substring(1);
        if (!roomHash) {
            roomHash = "fnaf-" + Math.floor(1000 + Math.random() * 9000);
            window.location.hash = roomHash;
        }
        document.getElementById('room-id-display').innerText = roomHash.toUpperCase();

        function logSystem(msg) {
            const logEl = document.getElementById('system-log');
            if (logEl) {
                const lines = logEl.innerHTML.split('<br>');
                logEl.innerHTML = `> ${msg}<br>` + lines.slice(0, 3).join('<br>');
            }
        }

        // ... Keep existing network and utility logic untouched
        function copyRoomLink() {
            navigator.clipboard.writeText(window.location.href);
            document.querySelector('.share-btn').innerText = "COPIED!";
            setTimeout(() => { document.querySelector('.share-btn').innerText = "📋 COPY ROOM LINK"; }, 2000);
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {}
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') await requestWakeLock();
        });

        // ==========================================
        // RETRO AUDIO SYNTHESIS ENGINE
        // ==========================================
        function playPowerOutSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 3.0); 
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 3.0);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 3.0);

                const kick = audioCtx.createOscillator();
                const kickGain = audioCtx.createGain();
                kick.type = 'sine';
                kick.frequency.setValueAtTime(80, now);
                kick.frequency.exponentialRampToValueAtTime(0.01, now + 0.5);
                kickGain.gain.setValueAtTime(0.8, now);
                kickGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                kick.connect(kickGain);
                kickGain.connect(audioCtx.destination);
                kick.start(now);
                kick.stop(now + 0.5);

                const bufferSize = audioCtx.sampleRate * 1.5; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.12, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                noise.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noise.start(now);
                noise.stop(now + 1.5);

            } catch (e) { console.error("Audio block:", e); }
        }

        function playGeneratorStartSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(30, now);
                osc.frequency.linearRampToValueAtTime(120, now + 1.8);
                gain.gain.setValueAtTime(0.01, now);
                gain.gain.linearRampToValueAtTime(0.4, now + 1.0);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 2.0);

                const clank = audioCtx.createOscillator();
                const clankGain = audioCtx.createGain();
                clank.type = 'triangle';
                clank.frequency.setValueAtTime(180, now + 1.5);
                clankGain.gain.setValueAtTime(0.5, now + 1.5);
                clankGain.gain.exponentialRampToValueAtTime(0.001, now + 2.1);
                clank.connect(clankGain);
                clankGain.connect(audioCtx.destination);
                clank.start(now + 1.5);
                clank.stop(now + 2.1);
            } catch(e){}
        }

        function playClickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e){}
        }

        function playWinSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;

                const chimeNotes = [
                    { f: 415.30, d: 0.6, t: 0.0 }, 
                    { f: 329.63, d: 0.6, t: 0.6 }, 
                    { f: 369.99, d: 0.6, t: 1.2 }, 
                    { f: 246.94, d: 1.2, t: 1.8 }  
                ];

                chimeNotes.forEach(note => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle'; 
                    osc.frequency.setValueAtTime(note.f, now + note.t);
                    gain.gain.setValueAtTime(0, now + note.t);
                    gain.gain.linearRampToValueAtTime(0.25, now + note.t + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + note.t + note.d);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + note.t);
                    osc.stop(now + note.t + note.d);
                });

                for (let i = 0; i < 6; i++) {
                    const bellTime = 3.0 + (i * 1.4);
                    [110, 220, 330].forEach(freq => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + bellTime);
                        gain.gain.setValueAtTime(0, now + bellTime);
                        gain.gain.linearRampToValueAtTime(0.35 / (freq/110), now + bellTime + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + bellTime + 1.3);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(now + bellTime);
                        osc.stop(now + bellTime + 1.4);
                    });
                }

                const fanfareTime = 11.5;
                const fanfare = [
                    { f: 523.25, d: 0.3, t: 0.0 }, 
                    { f: 523.25, d: 0.3, t: 0.3 }, 
                    { f: 523.25, d: 0.3, t: 0.6 }, 
                    { f: 523.25, d: 0.6, t: 0.9 }, 
                    { f: 466.16, d: 0.6, t: 1.5 }, 
                    { f: 523.25, d: 1.4, t: 2.1 }  
                ];

                fanfare.forEach(note => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'square'; 
                    osc.frequency.setValueAtTime(note.f, now + fanfareTime + note.t);
                    gain.gain.setValueAtTime(0, now + fanfareTime + note.t);
                    gain.gain.linearRampToValueAtTime(0.12, now + fanfareTime + note.t + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + fanfareTime + note.t + note.d);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + fanfareTime + note.t);
                    osc.stop(now + fanfareTime + note.t + note.d);
                });

            } catch (e) { console.error("Audio block:", e); }
        }

            peer.on('connection', (conn) => {

        async function initCameraMode() {
            myRole = 'cam';
            document.getElementById('slot-status').innerText = "PROBING LENSES...";
            
            try {
                let tempStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                tempStream.getTracks().forEach(t => t.stop());

                let foundFlashStream = null;
                for (const device of videoDevices) {
                    try {
                        const testStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: device.deviceId } } });
                        const testTrack = testStream.getVideoTracks()[0];
                        await new Promise(resolve => setTimeout(resolve, 250));
                        const capabilities = typeof testTrack.getCapabilities === 'function' ? testTrack.getCapabilities() : null;

                        if (capabilities && capabilities.torch) {
                            foundFlashStream = testStream;
                            break; 
                        } else {
                            testTrack.stop();
                        }
                    } catch (e) {}
                }

                if (foundFlashStream) {
                    localCameraStream = foundFlashStream;
                } else {
                    localCameraStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false
                    });
                }
                tryRegisterCamSlot(1);
            } catch (err) {
                document.getElementById('slot-status').innerText = "CAMERA BLOCKED";
            }
        }

            currentSlot = slotNum;

        // ==========================================
        // MOTION DETECTION
        // ==========================================
        function initMotionDetection() {
            motionCanvas = document.createElement('canvas');
            motionCanvas.width = 48;  
            motionCanvas.height = 36;
            motionCtx = motionCanvas.getContext('2d');
            setInterval(analyzeCameraMovementFrame, 150);
        }

        function analyzeCameraMovementFrame() {
            if (!localCameraStream || !mainMonitor || mainMonitor.paused || mainMonitor.ended) return;
            if (Date.now() < ignoreMotionUntil) { prevFrameData = null; return; }

            try {
                motionCtx.drawImage(mainMonitor, 0, 0, motionCanvas.width, motionCanvas.height);
                const currentFrame = motionCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
                const data = currentFrame.data;

                if (prevFrameData) {
                    let changedPixels = 0;
                    const totalPixels = motionCanvas.width * motionCanvas.height;

                    for (let i = 0; i < data.length; i += 4) {
                        const r1 = data[i], g1 = data[i+1], b1 = data[i+2];
                        const r2 = prevFrameData[i], g2 = prevFrameData[i+1], b2 = prevFrameData[i+2];

                        const bright1 = (r1 + g1 + b1) / 3;
                        const bright2 = (r2 + g2 + b2) / 3;

                        if (Math.abs(bright1 - bright2) > 22) changedPixels++;
                    }

                    if ((changedPixels / totalPixels) > 0.05) triggerMotionState(true);
                    else triggerMotionState(false);
                }
                prevFrameData = new Uint8ClampedArray(data); 
            } catch (e) {}
        }

        function triggerMotionState(movingNow) {
            if (movingNow) {
                if (motionTimeout) { clearTimeout(motionTimeout); motionTimeout = null; }
                if (!isCurrentlyMoving) {
                    isCurrentlyMoving = true;
                    sendMotionStateToGuard(true);
                    document.getElementById('motion-alert-banner').style.display = 'block';
                }
            } else {
                if (isCurrentlyMoving && !motionTimeout) {
                    motionTimeout = setTimeout(() => {
                        isCurrentlyMoving = false;
                        sendMotionStateToGuard(false);
                        document.getElementById('motion-alert-banner').style.display = 'none';
                        motionTimeout = null;
                    }, 1500); 
                }
            }
        }

        // ==========================================
        // WIRE REPAIR MINIGAME ENGINE
        // ==========================================
        let rightColors = [];
        let connections = [];
        let draggingFrom = null;
        let curX = 0, curY = 0;
        
        const leftX = 40;
        const leftY = [80, 160, 240, 320];
        const rightX = 260;
        const rightY = [80, 160, 240, 320];
        const leftColors = ['#ff3333', '#3333ff', '#ffff33', '#33ff33']; 

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function openWirePuzzle() {
            if (connections.length === 0 && draggingFrom === null) {
                rightColors = shuffle([...leftColors]);
            }
            
            document.getElementById('wire-minigame').style.display = 'flex';
            
            const canvas = document.getElementById('wire-canvas');
            canvas.width = 300;
            canvas.height = 400;
            
            drawWirePuzzle();
        }

        function drawWirePuzzle() {
            const canvas = document.getElementById('wire-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 300, 400);

            if (draggingFrom !== null) {
                ctx.beginPath();
                ctx.moveTo(leftX, leftY[draggingFrom]);
                ctx.lineTo(curX, curY);
                ctx.strokeStyle = leftColors[draggingFrom];
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            connections.forEach(conn => {
                ctx.beginPath();
                ctx.moveTo(leftX, leftY[conn.leftIdx]);
                ctx.bezierCurveTo(leftX + 80, leftY[conn.leftIdx], rightX - 80, rightY[conn.rightIdx], rightX, rightY[conn.rightIdx]);
                ctx.strokeStyle = leftColors[conn.leftIdx];
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.stroke();
            });

            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(leftX, leftY[i], 12, 0, Math.PI * 2);
                ctx.fillStyle = leftColors[i];
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(leftX, leftY[i], 4, 0, Math.PI * 2);
                ctx.fillStyle = '#111';
                ctx.fill();
            }

            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(rightX, rightY[i], 12, 0, Math.PI * 2);
                ctx.fillStyle = rightColors[i];
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(rightX, rightY[i], 4, 0, Math.PI * 2);
                ctx.fillStyle = '#111';
                ctx.fill();
            }
        }

        function getPuzzleCoords(e) {
            const board = document.getElementById('wire-board');
            const rect = board.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = (clientX - rect.left) * (300 / rect.width);
            const y = (clientY - rect.top) * (400 / rect.height);
            return { x, y };
        }

        function onPuzzleStart(e) {
            if (!isPowerOut) return;
            const coords = getPuzzleCoords(e);
            
            for (let i = 0; i < 4; i++) {
                const dy = coords.y - leftY[i];
                const dx = coords.x - leftX;
                if (Math.sqrt(dx*dx + dy*dy) < 25) {
                    if (connections.some(c => c.leftIdx === i)) continue;
                    draggingFrom = i;
                    curX = coords.x;
                    curY = coords.y;
                    e.preventDefault();
                    break;
                }
            }
        }

        function onPuzzleMove(e) {
            if (draggingFrom === null) return;
            const coords = getPuzzleCoords(e);
            curX = coords.x;
            curY = coords.y;
            drawWirePuzzle();
            e.preventDefault();
        }

        function onPuzzleEnd(e) {
            if (draggingFrom === null) return;
            
            for (let i = 0; i < 4; i++) {
                const dy = curY - rightY[i];
                const dx = curX - rightX;
                if (Math.sqrt(dx*dx + dy*dy) < 25) {
                    if (leftColors[draggingFrom] === rightColors[i]) {
                        if (!connections.some(c => c.rightIdx === i)) {
                            connections.push({ leftIdx: draggingFrom, rightIdx: i });
                            playClickSound();
                        }
                    }
                    break;
                }
            }
            draggingFrom = null;
            drawWirePuzzle();

            if (connections.length === 4) {
                setTimeout(restorePower, 300);
            }
        }

        const boardEl = document.getElementById('wire-board');
        boardEl.addEventListener('mousedown', onPuzzleStart);
        boardEl.addEventListener('mousemove', onPuzzleMove);
        window.addEventListener('mouseup', onPuzzleEnd);

        boardEl.addEventListener('touchstart', onPuzzleStart, { passive: false });
        boardEl.addEventListener('touchmove', onPuzzleMove, { passive: false });
        window.addEventListener('touchend', onPuzzleEnd);


        // ==========================================
        // MOTORIZED PANNING SYSTEM
        // ==========================================
        let currentPan = 0; let targetPan = 0; let touchStartX = 0; let basePan = 0;

        window.addEventListener('mousemove', (e) => {
            targetPan = (0.5 - (e.clientX / window.innerWidth)) * 24; 
        });

        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX; basePan = targetPan;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const deltaPercent = ((e.touches[0].clientX - touchStartX) / window.innerWidth) * 24;
            targetPan = Math.max(-12, Math.min(12, basePan + deltaPercent));
        }, { passive: true });

        function panAnimateLoop() {
            currentPan += (targetPan - currentPan) * 0.04; 
            if (mainMonitor) mainMonitor.style.transform = `scale(1.3) translateX(${currentPan}%)`;
            const lightOverlay = document.getElementById('light-overlay');
            if (lightOverlay) lightOverlay.style.transform = `scale(1.3) translateX(${currentPan * 1.08}%)`;
            requestAnimationFrame(panAnimateLoop);
        }
        panAnimateLoop();

        // ==========================================
        // UTILITIES & RENDER
        // ==========================================
        function getSlotFromPeerId(peerId) {
            const index = peerId.lastIndexOf('-cam-');
            if (index === -1) return null;
            return 'cam' + peerId.substring(index + 5);

        function sendMotionStateToGuard(active) {

        }

        function updateMonitorFeed() {
            if (myRole !== 'guard') return;

        function updateCameraMapUI() {
            for (let i = 1; i <= 4; i++) {
                const slotKey = 'cam' + i;
                const btn = document.querySelector(`.cam-btn[data-cam="${slotKey}"]`);
                if (!btn) continue;
                
                if (isPowerOut) {

        function switchCamera(event, camId, labelText) {
            if (myRole !== 'guard' || isPowerOut) return;

            triggerFlashlight(false);

        async function toggleDeviceFlashlight(stream, turnOn) {
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            if (!track) return;

            ignoreMotionUntil = Date.now() + 1200;
            try {
                const caps = typeof track.getCapabilities === 'function' ? track.getCapabilities() : null;
                if (caps && caps.torch) await track.applyConstraints({ advanced: [{ torch: turnOn }] });
                else triggerScreenFlash(turnOn);
            } catch (err) { triggerScreenFlash(turnOn); }
        }

        function triggerScreenFlash(turnOn) {
            const flashEl = document.getElementById('screen-flash');
            if (flashEl) flashEl.style.display = turnOn ? 'block' : 'none';
        }

        function triggerFlashlight(isPressed) {
            if (myRole !== 'guard' || isPowerOut) return;
            if (!isMonitorUp) isPressed = false; 

            isLightOn = isPressed;

            const monitorContainer = document.querySelector('.monitor-container');
            if (isPressed) monitorContainer.classList.add('light-on');
            else monitorContainer.classList.remove('light-on');
            
            const conn = dataConnections[currentCamId];
            if (conn) {
                try { conn.send({ type: 'flashlight', state: isPressed }); } catch (e) {}
            }
        }

        window.addEventListener('beforeunload', () => { if (peer) peer.destroy(); });
        window.onload = tryBecomeGuard;
    </script>
</body>
</html>
