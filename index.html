<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Flashlight - ON Only</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease;
        }

        .container {
            text-align: center;
            background: var(--panel-color);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 80%;
            max-width: 320px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .status {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            min-height: 40px;
            line-height: 1.4;
        }

        .power-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: #334155;
            color: #94a3b8;
            font-size: 2.5rem;
            cursor: pointer;
            outline: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 0 4px #475569;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .power-btn.active {
            background: #f59e0b;
            color: #ffffff;
            box-shadow: 0 0 25px #f59e0b, 0 0 0 4px #fbbf24;
            cursor: default; /* Indicates it can't be turned off */
        }

        #dummy-video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Turn On Flashlight</h1>
        <p class="status" id="status">Tap below to grant Camera permission and turn ON.</p>
        
        <button class="power-btn" id="flashlightBtn">⚡</button>
    </div>

    <!-- Invisible video element required for Android/Chrome hardware state -->
    <video id="dummy-video" autoplay playsinline muted></video>

    <script>
        const btn = document.getElementById('flashlightBtn');
        const statusText = document.getElementById('status');
        const videoElement = document.getElementById('dummy-video');
        
        let stream = null;
        let track = null;

        async function initCamera() {
            try {
                statusText.textContent = "Requesting initial camera permission...";
                
                let tempStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });

                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');

                tempStream.getTracks().forEach(t => t.stop());

                statusText.textContent = "Scanning camera lenses for flashlight support...";
                
                for (const device of videoDevices) {
                    try {
                        const testStream = await navigator.mediaDevices.getUserMedia({
                            video: { deviceId: { exact: device.deviceId } }
                        });
                        const testTrack = testStream.getVideoTracks()[0];

                        await new Promise(resolve => setTimeout(resolve, 250));

                        const capabilities = testTrack.getCapabilities();

                        if (capabilities && capabilities.torch) {
                            stream = testStream;
                            track = testTrack;
                            statusText.textContent = `Connected to: ${device.label || 'Main Camera'}`;
                            break; 
                        } else {
                            testTrack.stop();
                        }
                    } catch (e) {
                        console.warn(`Skipping device: ${device.label}`, e);
                    }
                }

                if (!track) {
                    statusText.textContent = "No explicit flashlight detected. Trying default camera...";
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' }
                    });
                    track = stream.getVideoTracks()[0];
                }

                videoElement.srcObject = stream;
                await videoElement.play();

                await new Promise(resolve => setTimeout(resolve, 250));
                return true;

            } catch (err) {
                statusText.textContent = "Error: Camera permission denied or device busy. Make sure other camera apps are closed!";
                console.error(err);
                return false;
            }
        }

        btn.addEventListener('click', async () => {
            // If the flashlight is already active, do nothing (no turning off)
            if (btn.classList.contains('active')) return;

            if (!stream) {
                const success = await initCamera();
                if (!success) return;
            }

            const capabilities = track.getCapabilities();
            if (!capabilities.torch) {
                statusText.textContent = "This lens doesn't support a web flashlight. Try closing other camera apps.";
                return;
            }

            try {
                // Hardcode the constraint to true so it only ever turns ON
                await track.applyConstraints({
                    advanced: [{ torch: true }]
                });

                btn.classList.add('active');
                statusText.textContent = "Flashlight is ON";
                document.body.style.backgroundColor = "#1e1b4b"; 
                
            } catch (error) {
                statusText.textContent = "Failed to turn on flashlight: " + error.message;
                console.error(error);
            }
        });

        // Make sure we stop the camera if the user leaves the tab
        window.addEventListener('beforeunload', () => {
            if (track) track.stop();
        });
    </script>
</body>
</html>
